// ═══ Class Editor ═══
const TIERS=[{id:'初級',c:'#94a3b8'},{id:'中級',c:'#3b82f6'},{id:'上級',c:'#f59e0b'}];
function ClassEditor({classData,setClassData,traits:traitsData}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  const [subTab,setSubTab]=useState(0); // 0=classes,1=CC,2=traits
  const names=useMemo(()=>Object.keys(classData.classes||{}),[classData]);
  function select(n){setSel(n);setDraft(n?JSON.parse(JSON.stringify(classData.classes[n])):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function udg(s,v){setDraft(p=>({...p,growth:{...(p.growth||{}),[s]:v}}));setDirty(true);}
  function udc(s,v){setDraft(p=>({...p,ccBonus:{...(p.ccBonus||{}),[s]:v}}));setDirty(true);}
  function uds(s,v){const k=draft?.tier==='初級'?'slots':'slotsAdd';setDraft(p=>({...p,[k]:{...(p[k]||{}),[s]:v}}));setDirty(true);}
  function save(){if(!sel||!draft)return;setClassData(p=>({...p,classes:{...p.classes,[sel]:draft}}));setDirty(false);}
  function discard(){if(!sel)return;setDraft(JSON.parse(JSON.stringify(classData.classes[sel])));setDirty(false);}
  const c=draft;
  const sK=c?.tier==='初級'?'slots':'slotsAdd';

  // CC sub-tab
  const ccV=(<div style={{padding:16}}>
    <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>中級CC (midCC)</h3>
    <div style={crd}>{Object.entries(classData.midCC||{}).map(([tag,cls])=>(<div key={tag} style={{...rowS,marginBottom:6}}>
      <span style={{fontSize:12,color:TAGS.find(t=>t.id===tag)?.c||'#94a3b8',fontWeight:700,width:50}}>{tag} →</span>
      <select value={cls} onChange={e=>setClassData(p=>({...p,midCC:{...p.midCC,[tag]:e.target.value}}))} style={{...iSm,width:140}}>
        {names.map(n=><option key={n} value={n}>{n}</option>)}
      </select>
    </div>))}</div>
    <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,marginTop:20}}>上級CC (advCC)</h3>
    <div style={crd}>{Object.entries(classData.advCC||{}).map(([key,opts])=>(<div key={key} style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:11,color:'#94a3b8',minWidth:110,flexShrink:0}}>{key} →</span>
      {opts.map((o,oi)=>(<select key={oi} value={o} onChange={e=>{const nv=[...opts];nv[oi]=e.target.value;setClassData(p=>({...p,advCC:{...p.advCC,[key]:nv}}));}} style={{...iSm,width:130}}>
        {names.filter(n=>classData.classes[n]?.tier==='上級').map(n=><option key={n} value={n}>{n}</option>)}
      </select>))}
    </div>))}</div>
  </div>);
  // Traits sub-tab
  function udTrait(tid,u){setClassData(p=>({...p,traits:{...p.traits,[tid]:{...p.traits[tid],...u}}}));}
  function addTrait(){const tid=prompt('特性ID:');if(!tid||classData.traits?.[tid])return;setClassData(p=>({...p,traits:{...p.traits,[tid]:{name:'',desc:''}}}));}
  function delTrait(tid){if(!confirm(`特性"${tid}"を削除?`))return;setClassData(p=>{const t={...p.traits};delete t[tid];return{...p,traits:t};});}
  const trV=(<div style={{padding:16}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
      <h3 style={{fontSize:14,fontWeight:700}}>兵種特性 (traits)</h3>
      <button onClick={addTrait} style={{fontSize:12,padding:'6px 12px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>+ 追加</button>
    </div>
    {Object.entries(classData.traits||{}).map(([tid,tr])=>(<div key={tid} style={{...crd,marginBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <span style={{fontSize:12,color:'#f59e0b',fontWeight:700,flexShrink:0}}>{tid}</span>
        <input value={tr.name||0} onChange={e=>udTrait(tid,{name:e.target.value})} style={{...iSm,flex:1}} placeholder="表示名"/>
        <button onClick={()=>delTrait(tid)} style={{fontSize:10,padding:'3px 6px',background:'rgba(239,68,68,0.15)',color:'#fca5a5',border:'none',borderRadius:4,cursor:'pointer',flexShrink:0}}>✕</button>
      </div>
      <input value={tr.desc||0} onChange={e=>udTrait(tid,{desc:e.target.value})} style={{...iS,fontSize:12}} placeholder="効果説明"/>
    </div>))}
  </div>);

  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{display:'flex',borderBottom:'1px solid #334155',flexShrink:0}}>
      {['クラス','CC構造','兵種特性'].map((l,i)=>(<button key={i} onClick={()=>setSubTab(i)} style={{flex:1,padding:'8px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',borderBottom:subTab===i?'2px solid #3b82f6':'2px solid transparent',background:'transparent',color:subTab===i?'#e2e8f0':'#64748b'}}>{l}</button>))}
    </div>
    {subTab===0&&<div style={{flex:1,overflowY:'auto',padding:8}}>
      {names.map(n=>{const x=classData.classes[n];const ti=TIERS.find(t=>t.id===x.tier);
        return(<div key={n} onClick={()=>select(n)} style={{padding:'8px 12px',marginBottom:3,borderRadius:6,cursor:'pointer',background:sel===n?'rgba(59,130,246,0.15)':'#1e293b',border:sel===n?'1px solid rgba(59,130,246,0.4)':'1px solid #334155'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#334155',color:ti?.c||'#94a3b8'}}>{x.tier}</span>
            {x.tag&&<span style={{fontSize:10,padding:'2px 5px',borderRadius:4,color:TAGS.find(t=>t.id===x.tag)?.c,background:TAGS.find(t=>t.id===x.tag)?.c+'20',fontWeight:700}}>{TAGS.find(t=>t.id===x.tag)?.l}</span>}
            {x.tags&&x.tags.map((tg,i)=>{const tt=TAGS.find(t=>t.id===tg);return tt?<span key={i} style={{fontSize:10,padding:'2px 5px',borderRadius:4,color:tt.c,background:tt.c+'20',fontWeight:700}}>{tt.l}</span>:null;})}
            <span style={{fontSize:13,fontWeight:600}}>{n}</span>
            {n===sel&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
          </div>
          <div style={{fontSize:11,color:'#64748b',marginTop:2}}>PP:{x.pp} HP:{x.growth?.hp} STR:{x.growth?.str} DEF:{x.growth?.def} INT:{x.growth?.int}{x.trait?` [${x.trait}]`:''}</div>
        </div>);})}
    </div>}
    {subTab===1&&<div style={{flex:1,overflowY:'auto'}}>{ccV}</div>}
    {subTab===2&&<div style={{flex:1,overflowY:'auto'}}>{trV}</div>}
  </div>);

  const detV=c?(<div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
    <h2 style={{fontSize:18,fontWeight:700,marginBottom:16}}>{sel}</h2>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>階級</div>
      <div style={{display:'flex',gap:4}}>{TIERS.map(x=><button key={x.id} onClick={()=>ud({tier:x.id})} style={chip(c.tier===x.id,x.c)}>{x.id}</button>)}</div>
      {c.tier==='中級'&&<><div style={lbl}>タグ</div><div style={{display:'flex',gap:4}}>{TAGS.slice(0,3).map(x=><button key={x.id} onClick={()=>ud({tag:x.id})} style={chip(c.tag===x.id,x.c)}>{x.l}</button>)}</div></>}
      {c.tier==='上級'&&<><div style={lbl}>タグ(2つ)</div><div style={{display:'flex',gap:4}}>{[0,1].map(ti=>(<select key={ti} value={(c.tags||[])[ti]||0} onChange={e=>{const ts=[...(c.tags||['',''])];ts[ti]=e.target.value;ud({tags:ts});}} style={{...iSm,width:90}}>
        {TAGS.slice(0,3).map(x=><option key={x.id} value={x.id}>{x.l} ({x.id})</option>)}
      </select>))}</div></>}
      <div style={lbl}>PP</div><input type="number" value={c.pp||0} onChange={e=>ud({pp:+e.target.value})} style={iNum}/>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>成長率</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:30}}>{s}</span>
        <input type="number" value={c.growth?.[s]??0} step={0.1} onChange={e=>udg(s,+e.target.value)} style={iNum}/>
      </div>))}</div>
    </div>
    {c.ccBonus!=null&&<div style={crd}>
      <div style={{...lbl,marginTop:0}}>CC補正</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:30}}>{s}</span>
        <input type="number" value={c.ccBonus?.[s]??0} onChange={e=>udc(s,+e.target.value)} style={iNum}/>
      </div>))}</div>
    </div>}
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>枠数 ({sK})</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['tech','skill','item'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',width:40}}>{s}</span>
        <input type="number" value={c[sK]?.[s]??0} onChange={e=>uds(s,+e.target.value)} style={iNum}/>
      </div>))}</div>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>射程</div>
      {c.range?<div style={{...rowS}}><input type="number" value={c.range.min} onChange={e=>ud({range:{...c.range,min:+e.target.value}})} style={iNum}/><span style={{color:'#64748b'}}>〜</span><input type="number" value={c.range.max} onChange={e=>ud({range:{...c.range,max:+e.target.value}})} style={iNum}/></div>
      :<span style={{fontSize:12,color:'#475569'}}>なし</span>}
      <div style={lbl}>兵種特性</div>
      <select value={c.trait||0} onChange={e=>ud({trait:e.target.value||null})} style={{...iSm,width:200}}><option value="">なし</option>{Object.entries(traitsData||{}).map(([tid,tr])=><option key={tid} value={tid}>{tr.name||tid} ({tid})</option>)}</select>
    </div>
    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>
      <pre style={{background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:10,fontSize:11,color:'#94a3b8',overflow:'auto',maxHeight:200}}>{JSON.stringify(c,null,2)}</pre></details>
    {dirty&&<div className="save-bar"><button onClick={save} style={{...btnP,flex:1,background:'#3b82f6',color:'#fff'}}>✓ 保存</button><button onClick={discard} style={{...btnP,background:'#334155',color:'#94a3b8'}}>破棄</button></div>}
  </div>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569'}}>クラスを選択</div>;
  return <DualLayout list={listV} detail={detV} sel={sel} onBack={()=>{setSel(null);setDraft(null);setDirty(false);}}/>;
}

// ═══ Unit Editor ═══
function UnitEditor({units,setUnits,techs,traits}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  const [gFlt,setGFlt]=useState('');
  const filtered=useMemo(()=>units.filter(u=>{if(!gFlt)return true;return u.tags?.includes(gFlt);}),[units,gFlt]);
  function select(id){const u=units.find(x=>x.id===id);setSel(id);setDraft(u?JSON.parse(JSON.stringify(u)):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function udb(s,v){setDraft(p=>({...p,base:{...(p.base||{}),[s]:v}}));setDirty(true);}
  function save(){if(!sel||!draft)return;setUnits(p=>p.map(x=>x.id===sel?draft:x));setDirty(false);}
  function discard(){if(!sel)return;const u=units.find(x=>x.id===sel);setDraft(u?JSON.parse(JSON.stringify(u)):null);setDirty(false);}
  function add(){const mx=units.length;const id=`p${String(mx+1).padStart(2,'0')}`;setUnits(p=>[...p,{id,name:'新キャラ',tags:['fire','water'],base:{hp:35,str:8,def:8,int:8,mov:4,pp:2},initTechs:[],trait:null,traitDesc:null,color:'#888888'}]);select(id);}
  function del(){if(!sel||!confirm(`"${draft?.name}"を削除?`))return;setUnits(p=>p.filter(x=>x.id!==sel));setSel(null);setDraft(null);setDirty(false);}
  function mv(id,dir){const idx=units.findIndex(u=>u.id===id);const ni=idx+dir;if(ni<0||ni>=units.length)return;setUnits(p=>{const n=[...p];[n[idx],n[ni]]=[n[ni],n[idx]];return n;});}
  function dup(id){const src=units.find(u=>u.id===id);if(!src)return;const mx=units.length;const nid=`p${String(mx+1).padStart(2,'0')}`;const cp={...JSON.parse(JSON.stringify(src)),id:nid,name:src.name+'_copy'};const idx=units.findIndex(u=>u.id===id);setUnits(p=>{const n=[...p];n.splice(idx+1,0,cp);return n;});select(nid);}
  function reorderUnits(fi,ti){const fid=filtered[fi]?.id,tid=filtered[ti]?.id;if(!fid||!tid)return;const a=units.findIndex(u=>u.id===fid),b=units.findIndex(u=>u.id===tid);if(a<0||b<0)return;setUnits(p=>{const n=[...p];const [item]=n.splice(a,1);n.splice(b,0,item);return n;});}
  const u=draft;
  const techNames=useMemo(()=>Object.keys(techs||{}).filter(k=>!k.startsWith('_')),[techs]);
  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{padding:12,borderBottom:'1px solid #334155'}}>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        <button onClick={()=>setGFlt('')} style={chipF(!gFlt,'#e2e8f0')}>全</button>
        {TAGS.slice(0,3).map(x=><button key={x.id} onClick={()=>setGFlt(x.id===gFlt?'':x.id)} style={chipF(gFlt===x.id,x.c)}>{x.l}</button>)}
        <span style={{marginLeft:'auto',fontSize:11,color:'#475569',alignSelf:'center'}}>{filtered.length}/{units.length}</span>
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:8}}>
      {filtered.map((uu,i)=>{const idx=units.indexOf(uu);return(
        <ListItem key={uu.id} selected={sel===uu.id} onClick={()=>select(uu.id)} onUp={()=>mv(uu.id,-1)} onDown={()=>mv(uu.id,1)} onDup={()=>dup(uu.id)} onDel={()=>{if(!confirm(`"${uu.name}"を削除?`))return;setUnits(p=>p.filter(x=>x.id!==uu.id));if(sel===uu.id){setSel(null);setDraft(null);setDirty(false);}}} first={idx===0} last={idx===units.length-1} idx={i} onReorder={reorderUnits}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:16,height:16,borderRadius:8,background:uu.color,border:'1px solid #475569',flexShrink:0,overflow:'hidden'}}>
              {uu.chip&&<img src={`../public/chips/${uu.chip}`} style={{width:'100%',height:'100%',objectFit:'cover',imageRendering:'pixelated'}} onError={e=>{e.target.style.display='none';}}/>}
            </div>
            {uu.tags?.map((tg,j)=>{const tt=TAGS.find(t=>t.id===tg);return tt?<span key={j} style={{fontSize:9,color:tt.c,fontWeight:700}}>{tt.l}</span>:null;})}
            <span style={{fontSize:13,fontWeight:600}}>{uu.name}</span>
            <span style={{fontSize:10,color:'#475569'}}>{uu.id}</span>
            {uu.id===sel&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
          </div>
          <div style={{fontSize:11,color:'#64748b',marginTop:2}}>HP:{uu.base?.hp} STR:{uu.base?.str} DEF:{uu.base?.def} INT:{uu.base?.int}{uu.trait?` [${uu.trait}]`:''}</div>
        </ListItem>);})}
    </div>
    <div style={{padding:12,borderTop:'1px solid #334155'}}><button onClick={add} style={{...btnP,width:'100%',background:'#3b82f6',color:'#fff'}}>+ キャラ追加</button></div>
  </div>);

  const detV=u?(<div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
      <div style={{width:24,height:24,borderRadius:12,background:u.color,border:'1px solid #475569',overflow:'hidden'}}>
        {u.chip&&<img src={`../public/chips/${u.chip}`} style={{width:'100%',height:'100%',objectFit:'cover',imageRendering:'pixelated'}} onError={e=>{e.target.style.display='none';}}/>}
      </div>
      <h2 style={{fontSize:18,fontWeight:700,flex:1}}>{u.name}</h2>
      <button onClick={del} style={{...btnP,background:'rgba(239,68,68,0.15)',color:'#fca5a5',padding:'6px 12px',fontSize:12}}>削除</button>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>ID</div><input value={u.id} onChange={e=>ud({id:e.target.value})} style={{...iSm,width:80}}/>
      <div style={lbl}>名前</div><input value={u.name} onChange={e=>ud({name:e.target.value})} style={iS}/>
      <div style={lbl}>色</div><div style={rowS}><input type="color" value={u.color||'#888888'} onChange={e=>ud({color:e.target.value})} style={{width:48,height:36,border:'1px solid #334155',borderRadius:4,cursor:'pointer'}}/><input value={u.color||0} onChange={e=>ud({color:e.target.value})} style={{...iSm,width:100}}/></div>
      <div style={lbl}>チップ画像</div>
      <div style={rowS}>
        <input value={u.chip||''} onChange={e=>ud({chip:e.target.value||undefined})} style={{...iSm,width:180}} placeholder="ファイル名 (例: marta.png)"/>
        {u.chip&&<img src={`../public/chips/${u.chip}`} alt="" style={{width:32,height:32,borderRadius:4,objectFit:'cover',imageRendering:'pixelated',border:'1px solid #475569'}} onError={e=>e.target.style.display='none'}/>}
      </div>
      <div style={{fontSize:10,color:'#475569',marginTop:2}}>public/chips/ に配置。未設定時は色＋名前フォールバック</div>
      <div style={lbl}>タグ</div>
      <div style={{display:'flex',gap:4}}>{[0,1].map(ti=>(<select key={ti} value={u.tags?.[ti]||0} onChange={e=>{const ts=[...(u.tags||['',''])];ts[ti]=e.target.value;ud({tags:ts});}} style={{...iSm,width:90}}>
        {TAGS.slice(0,3).map(x=><option key={x.id} value={x.id}>{x.l} ({x.id})</option>)}
      </select>))}</div>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>基礎ステータス</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int','mov','pp'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:28}}>{s}</span>
        <input type="number" value={u.base?.[s]??0} onChange={e=>udb(s,+e.target.value)} style={iNum}/>
      </div>))}</div>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>初期技</div>
      {(u.initTechs||[]).map((tn,i)=>(<div key={i} style={{...rowS,marginBottom:4}}>
        <select value={tn} onChange={e=>{const ts=[...(u.initTechs||[])];ts[i]=e.target.value;ud({initTechs:ts});}} style={{...iSm,flex:1}}>
          <option value="">-</option>{techNames.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <button onClick={()=>{const ts=[...(u.initTechs||[])];ts.splice(i,1);ud({initTechs:ts});}} style={{fontSize:11,padding:'4px 8px',background:'rgba(239,68,68,0.15)',color:'#fca5a5',border:'none',borderRadius:4,cursor:'pointer'}}>✕</button>
      </div>))}
      <button onClick={()=>ud({initTechs:[...(u.initTechs||[]),'猛撃']})} style={{fontSize:12,padding:'6px 12px',background:'#334155',color:'#94a3b8',border:'none',borderRadius:6,cursor:'pointer',marginTop:4}}>+ 初期技追加</button>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>個性特性</div>
      <select value={u.trait||0} onChange={e=>ud({trait:e.target.value||null,traitDesc:e.target.value?traits[e.target.value]?.desc||u.traitDesc||'':null})} style={{...iSm,width:'100%'}}>
        <option value="">なし</option>
        {Object.entries(traits||{}).map(([id,tr])=><option key={id} value={id}>{tr.name||id} ({id})</option>)}
      </select>
      {u.trait&&<div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>{traits[u.trait]?.desc||u.traitDesc||''}</div>}
      {u.trait&&!traits[u.trait]&&<><div style={lbl}>特性説明（未登録特性）</div>
        <input value={u.traitDesc||0} onChange={e=>ud({traitDesc:e.target.value||null})} style={iS} placeholder="表示テキスト"/></>}
    </div>
    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>
      <pre style={{background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:10,fontSize:11,color:'#94a3b8',overflow:'auto',maxHeight:200}}>{JSON.stringify(u,null,2)}</pre></details>
    {dirty&&<div className="save-bar"><button onClick={save} style={{...btnP,flex:1,background:'#3b82f6',color:'#fff'}}>✓ 保存</button><button onClick={discard} style={{...btnP,background:'#334155',color:'#94a3b8'}}>破棄</button></div>}
  </div>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569'}}>味方を選択</div>;
  return <DualLayout list={listV} detail={detV} sel={sel} onBack={()=>{setSel(null);setDraft(null);setDirty(false);}}/>;
}

// ═══ Enemy Editor ═══
const MOVEMENTS=[{id:'rush',l:'突撃'},{id:'reactive',l:'待機'},{id:'fixed',l:'完全待機'},{id:'flee',l:'逃避'}];
const ACTIONS=[{id:'attack',l:'攻撃優先'},{id:'support',l:'支援優先'},{id:'debuff',l:'妨害優先'},{id:'techFocus',l:'技指定'}];
const CHG_TRIGGERS=[{id:'mapStart',l:'マップ開始'},{id:'proximity',l:'接近'},{id:'hpBelow',l:'HP低下'},{id:'turn',l:'ターン'},{id:'onHit',l:'被弾'},{id:'engaged',l:'交戦'},{id:'inRange',l:'範囲内'},{id:'allyHit',l:'味方被弾'}];
const AI_TRIGGERS=[{id:'hpBelow',l:'HP低下'},{id:'turn',l:'ターン'},{id:'proximity',l:'接近'},{id:'engaged',l:'交戦'},{id:'inRange',l:'範囲内'},{id:'allyDefeated',l:'味方撃破'},{id:'allyHpBelow',l:'味方HP低下'},{id:'allyAIChanged',l:'味方AI変化'}];
function EnemyEditor({enemies,setEnemies,techs,items,parts}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  const names=useMemo(()=>Object.keys(enemies||{}),[enemies]);
  const techNames=useMemo(()=>Object.keys(techs||{}).filter(k=>!k.startsWith('_')),[techs]);
  const partsList=useMemo(()=>(parts||[]).filter(p=>'id' in p),[parts]);
  function select(n){setSel(n);setDraft(n?JSON.parse(JSON.stringify(enemies[n])):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function udb(s,v){setDraft(p=>({...p,base:{...(p.base||{}),[s]:v}}));setDirty(true);}
  function udg(s,v){setDraft(p=>({...p,growth:{...(p.growth||{}),[s]:v}}));setDirty(true);}
  function udai(u){setDraft(p=>({...p,ai:{...(p.ai||{movement:'rush',action:'attack'}),...u}}));setDirty(true);}
  function save(){if(!sel||!draft)return;setEnemies(p=>({...p,[sel]:draft}));setDirty(false);}
  function discard(){if(!sel)return;setDraft(JSON.parse(JSON.stringify(enemies[sel])));setDirty(false);}
  function add(){const n=prompt('敵テンプレート名:');if(!n||enemies[n])return;setEnemies(p=>({...p,[n]:{baseLv:1,base:{hp:30,str:10,def:6,int:5,mov:4,pp:5},growth:{hp:3,str:1,def:1,int:0.5},range:{min:1,max:1},techs:[],ai:{movement:'rush',action:'attack'},color:'#dc2626'}}));select(n);}
  function ren(){if(!sel)return;const n=prompt('新しい名前:',sel);if(!n||n===sel||enemies[n])return;
    const saved=dirty?draft:enemies[sel];
    setEnemies(p=>{const o={};Object.keys(p).forEach(k=>{o[k===sel?n:k]=p[k];});if(dirty)o[n]=saved;return o;});setSel(n);setDraft(JSON.parse(JSON.stringify(saved)));setDirty(false);}
  function del(){if(!sel||!confirm(`"${sel}"を削除?`))return;setEnemies(p=>{const o={...p};delete o[sel];return o;});setSel(null);setDraft(null);setDirty(false);}
  function dupE(){if(!sel)return;let nn=sel+'_copy';let c=2;while(enemies[nn]){nn=sel+'_copy'+c;c++;}const cp=JSON.parse(JSON.stringify(enemies[sel]));setEnemies(p=>{const o={};Object.keys(p).forEach(k=>{o[k]=p[k];if(k===sel)o[nn]=cp;});return o;});select(nn);}
  // aiRules helpers
  function addRule(){setDraft(p=>({...p,aiRules:[...(p.aiRules||[]),{trigger:{type:'hpBelow',pct:50},ai:{movement:'rush'}}]}));setDirty(true);}
  function udRule(ri,u){setDraft(p=>{const rs=[...(p.aiRules||[])];rs[ri]={...rs[ri],...u};return{...p,aiRules:rs};});setDirty(true);}
  function udRuleTr(ri,u){setDraft(p=>{const rs=[...(p.aiRules||[])];rs[ri]={...rs[ri],trigger:{...rs[ri].trigger,...u}};return{...p,aiRules:rs};});setDirty(true);}
  function udRuleAi(ri,u){setDraft(p=>{const rs=[...(p.aiRules||[])];rs[ri]={...rs[ri],ai:{...rs[ri].ai,...u}};return{...p,aiRules:rs};});setDirty(true);}
  function rmRule(ri){setDraft(p=>({...p,aiRules:(p.aiRules||[]).filter((_,j)=>j!==ri)}));setDirty(true);}

  const e=draft;
  const ai=e?.ai||e?.behavior&&{movement:e.behavior==='aggressive'?'rush':'reactive',action:'attack'}||{movement:'rush',action:'attack'};

  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flex:1,overflowY:'auto',padding:8}}>
      {names.map(n=>{const x=enemies[n];const xa=x.ai||{};const mv=xa.movement||(x.behavior==='aggressive'?'rush':x.behavior==='stationary'?'reactive':'rush');
        return(<div key={n} onClick={()=>select(n)} style={{padding:'8px 12px',marginBottom:3,borderRadius:6,cursor:'pointer',background:sel===n?'rgba(59,130,246,0.15)':'#1e293b',border:sel===n?'1px solid rgba(59,130,246,0.4)':'1px solid #334155'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:16,height:16,borderRadius:4,background:x.color,border:'1px solid #475569',flexShrink:0,overflow:'hidden'}}>
              {x.chip&&<img src={`../public/chips/${x.chip}`} style={{width:'100%',height:'100%',objectFit:'cover',imageRendering:'pixelated'}} onError={e=>{e.target.style.display='none';}}/>}
            </div>
            <span style={{fontSize:13,fontWeight:600}}>{n}</span>
            {x.bossRank&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'#7f1d1d',color:'#fca5a5'}}>BOSS</span>}
            {x.charge&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'#78350f',color:'#fbbf24'}}>CHG</span>}
            {x.drop&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'#1e3a5f',color:'#60a5fa'}}>DROP</span>}
            {n===sel&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
          </div>
          <div style={{fontSize:11,color:'#64748b',marginTop:2}}>HP:{x.base?.hp} STR:{x.base?.str} DEF:{x.base?.def} INT:{x.base?.int} PP:{x.base?.pp||0} [{mv}/{xa.action||'attack'}]</div>
        </div>);})}
    </div>
    <div style={{padding:12,borderTop:'1px solid #334155'}}><button onClick={add} style={{...btnP,width:'100%',background:'#3b82f6',color:'#fff'}}>+ 敵追加</button></div>
  </div>);

  const detV=e?(<div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
      <div style={{width:24,height:24,borderRadius:4,background:e.color,border:'1px solid #475569',overflow:'hidden'}}>
        {e.chip&&<img src={`../public/chips/${e.chip}`} style={{width:'100%',height:'100%',objectFit:'cover',imageRendering:'pixelated'}} onError={ev=>{ev.target.style.display='none';}}/>}
      </div>
      <h2 style={{fontSize:18,fontWeight:700,flex:1}}>{sel}</h2>
      <button onClick={ren} style={{...btnP,background:'#334155',color:'#94a3b8',padding:'6px 12px',fontSize:12}}>名前変更</button>
      <button onClick={dupE} style={{...btnP,background:'#334155',color:'#94a3b8',padding:'6px 12px',fontSize:12}}>複製</button>
      <button onClick={del} style={{...btnP,background:'rgba(239,68,68,0.15)',color:'#fca5a5',padding:'6px 12px',fontSize:12}}>削除</button>
    </div>

    {/* 基本情報 */}
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>色</div><div style={rowS}><input type="color" value={e.color||'#dc2626'} onChange={e2=>ud({color:e2.target.value})} style={{width:48,height:36,border:'1px solid #334155',borderRadius:4,cursor:'pointer'}}/><input value={e.color||0} onChange={e2=>ud({color:e2.target.value})} style={{...iSm,width:100}}/></div>
      <div style={lbl}>チップ画像</div>
      <div style={rowS}>
        <input value={e.chip||''} onChange={e2=>ud({chip:e2.target.value||undefined})} style={{...iSm,width:180}} placeholder="ファイル名 (例: zombie.png)"/>
        {e.chip&&<img src={`../public/chips/${e.chip}`} alt="" style={{width:32,height:32,borderRadius:4,objectFit:'cover',imageRendering:'pixelated',border:'1px solid #475569'}} onError={ev=>ev.target.style.display='none'}/>}
      </div>
      <div style={{...rowS,marginTop:8,gap:16}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{fontSize:11,color:'#94a3b8'}}>初期Lv:</span>
          <input type="number" value={e.baseLv||1} min={1} onChange={e2=>ud({baseLv:+e2.target.value})} style={iNum}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{fontSize:11,color:'#94a3b8'}}>振れ幅±:</span>
          <input type="number" value={e.variance||0} min={0} onChange={e2=>ud({variance:+e2.target.value||undefined})} style={iNum}/>
        </div>
      </div>
      <div style={{fontSize:10,color:'#475569',marginTop:2}}>振れ幅: 各ステに±N（HPは±N×3）のランダム。マップ読込ごとに再抽選</div>
      <div style={lbl}>基礎ステータス (初期Lv時点)</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int','mov','pp'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:28}}>{s}</span>
        <input type="number" value={e.base?.[s]??0} step={s==='pp'?1:1} onChange={e2=>udb(s,+e2.target.value)} style={iNum}/>
      </div>))}</div>
      <div style={lbl}>成長率 (/Lv)</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:28}}>{s}</span>
        <input type="number" value={e.growth?.[s]??0} step={0.1} onChange={e2=>udg(s,+e2.target.value)} style={iNum}/>
      </div>))}</div>
      <div style={{fontSize:10,color:'#475569',marginTop:4}}>base + growth × (Lv − baseLv) でスケール。配置Lv &lt; baseLvの場合はbaseLvとして扱う</div>
      <div style={lbl}>射程</div>
      <div style={rowS}><input type="number" value={e.range?.min??1} onChange={e2=>ud({range:{...(e.range||{}),min:+e2.target.value}})} style={iNum}/><span style={{color:'#64748b'}}>〜</span><input type="number" value={e.range?.max??1} onChange={e2=>ud({range:{...(e.range||{}),max:+e2.target.value}})} style={iNum}/></div>
      <div style={{display:'flex',gap:12,marginTop:8}}>
        <label style={{fontSize:12,color:'#94a3b8',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={e.bossRank||false} onChange={e2=>ud({bossRank:e2.target.checked||undefined})}/> ボスランク</label>
      </div>
    </div>

    {/* ドロップ */}
    <div style={crd}>
      <div style={{...lbl,marginTop:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span>ドロップ品</span>
        {!e.drop?<button onClick={()=>ud({drop:{type:'item',ref:'',rate:100}})} style={{fontSize:11,padding:'4px 10px',background:'#334155',color:'#94a3b8',border:'none',borderRadius:4,cursor:'pointer'}}>追加</button>
        :<button onClick={()=>ud({drop:undefined})} style={{fontSize:11,padding:'4px 10px',background:'rgba(239,68,68,0.15)',color:'#fca5a5',border:'none',borderRadius:4,cursor:'pointer'}}>削除</button>}
      </div>
      {e.drop&&(<div>
        <div style={{display:'flex',gap:4,marginBottom:6}}>
          <button onClick={()=>ud({drop:{...e.drop,type:'item',ref:''}})} style={chip(e.drop.type==='item','#f59e0b')}>アイテム</button>
          <button onClick={()=>ud({drop:{...e.drop,type:'part',ref:''}})} style={chip(e.drop.type==='part','#8b5cf6')}>パーツ</button>
        </div>
        <div style={{...rowS,marginBottom:6}}>
          <select value={e.drop.ref||0} onChange={e2=>ud({drop:{...e.drop,ref:e2.target.value}})} style={{...iSm,flex:1}}>
            <option value="">- 選択 -</option>
            {e.drop.type==='item'&&(items||[]).map(it=><option key={it.id} value={it.id}>{it.name}</option>)}
            {e.drop.type==='part'&&partsList.map(p=><option key={p.id} value={String(p.id)}>{p.name}</option>)}
          </select>
          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <span style={{fontSize:11,color:'#64748b'}}>率%:</span>
            <input type="number" value={e.drop.rate??100} min={0} max={100} onChange={e2=>ud({drop:{...e.drop,rate:+e2.target.value}})} style={{...iNum,width:50}}/>
          </div>
        </div>
      </div>)}
    </div>

    {/* AI 2軸 */}
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>AI — 移動パターン</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{MOVEMENTS.map(m=><button key={m.id} onClick={()=>udai({movement:m.id})} style={chip(ai.movement===m.id,'#3b82f6')}>{m.l}</button>)}</div>
      <div style={lbl}>AI — 行動パターン</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{ACTIONS.map(a=><button key={a.id} onClick={()=>udai({action:a.id})} style={chip(ai.action===a.id,'#22c55e')}>{a.l}</button>)}</div>
      {ai.action==='techFocus'&&<><div style={lbl}>指定技</div><select value={ai.focusTech||0} onChange={e2=>udai({focusTech:e2.target.value})} style={{...iSm,width:160}}>
        <option value="">-</option>{techNames.map(n=><option key={n} value={n}>{n}</option>)}
      </select></>}
    </div>

    {/* 技 */}
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>技</div>
      {(e.techs||[]).map((tn,i)=>(<div key={i} style={{...rowS,marginBottom:4}}>
        <select value={tn} onChange={e2=>{const ts=[...(e.techs||[])];ts[i]=e2.target.value;ud({techs:ts});}} style={{...iSm,flex:1}}>
          <option value="">-</option>{techNames.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <button onClick={()=>{const ts=[...(e.techs||[])];ts.splice(i,1);ud({techs:ts});}} style={{fontSize:11,padding:'4px 8px',background:'rgba(239,68,68,0.15)',color:'#fca5a5',border:'none',borderRadius:4,cursor:'pointer'}}>✕</button>
      </div>))}
      <button onClick={()=>ud({techs:[...(e.techs||[]),'強撃']})} style={{fontSize:12,padding:'6px 12px',background:'#334155',color:'#94a3b8',border:'none',borderRadius:6,cursor:'pointer',marginTop:4}}>+ 技追加</button>
    </div>

    {/* チャージ */}
    <div style={crd}>

          {MOVEMENTS.map(m=><button key={m.id} onClick={()=>udRuleAi(ri,{movement:m.id})} style={{...chip(rule.ai?.movement===m.id,'#3b82f6'),padding:'4px 8px',fontSize:11,minHeight:28}}>{m.l}</button>)}
        </div>

        </div>
        {rule.ai?.action==='techFocus'&&<div style={{...rowS,marginTop:4}}><span style={{fontSize:10,color:'#64748b'}}>技:</span><select value={rule.ai.focusTech||0} onChange={e2=>udRuleAi(ri,{focusTech:e2.target.value})} style={{...iSm,width:140}}>

        </select></div>}
      </div>))}
      {(e.aiRules||[]).length===0&&<div style={{fontSize:12,color:'#475569',textAlign:'center',padding:8}}>ルールなし（デフォルトAIのみ）</div>}
    </div>

    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>

  </div>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569'}}>敵を選択</div>;
  return <DualLayout list={listV} detail={detV} sel={sel} onBack={()=>{setSel(null);setDraft(null);setDirty(false);}}/>;
}

// ═══ Item Editor ═══
function ItemEditor({items,setItems,counterNames}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  function select(id){const it=items.find(x=>x.id===id);setSel(id);setDraft(it?JSON.parse(JSON.stringify(it)):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function save(){if(!sel||!draft)return;setItems(p=>p.map(x=>x.id===sel?draft:x));setDirty(false);}
  function discard(){if(!sel)return;const it=items.find(x=>x.id===sel);setDraft(it?JSON.parse(JSON.stringify(it)):null);setDirty(false);}
  function add(){const id='item_'+Date.now()%10000;setItems(p=>[...p,{id,name:'新アイテム',effects:[],desc:''}]);select(id);}
  function del(){if(!sel||!confirm(`"${draft?.name}"を削除?`))return;setItems(p=>p.filter(x=>x.id!==sel));setSel(null);setDraft(null);setDirty(false);}
  const it=draft;
  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flex:1,overflowY:'auto',padding:8}}>
      {items.map(x=>(<div key={x.id} onClick={()=>select(x.id)} style={{padding:'8px 12px',marginBottom:3,borderRadius:6,cursor:'pointer',background:sel===x.id?'rgba(59,130,246,0.15)':'#1e293b',border:sel===x.id?'1px solid rgba(59,130,246,0.4)':'1px solid #334155'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:13,fontWeight:600}}>{x.name}</span>
          <span style={{fontSize:9,color:'#475569'}}>{(x.effects||[]).length||(x.effect?1:0)}fx</span>
          {x.id===sel&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
        </div>
        <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{x.desc}</div>
      </div>))}
    </div>
    <div style={{padding:12,borderTop:'1px solid #334155'}}><button onClick={add} style={{...btnP,width:'100%',background:'#3b82f6',color:'#fff'}}>+ アイテム追加</button></div>
  </div>);
  const detV=it?(<div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
      <h2 style={{fontSize:18,fontWeight:700,flex:1}}>{it.name}</h2>
      <button onClick={del} style={{...btnP,background:'rgba(239,68,68,0.15)',color:'#fca5a5',padding:'6px 12px',fontSize:12}}>削除</button>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>ID</div><input value={it.id} onChange={e=>ud({id:e.target.value})} style={{...iSm,width:150}}/>
      <div style={lbl}>名前</div><input value={it.name} onChange={e=>ud({name:e.target.value})} style={iS}/>
      <div style={lbl}>説明</div><input value={it.desc||0} onChange={e=>ud({desc:e.target.value})} style={iS}/>
      <div style={{display:'flex',gap:12,marginTop:8}}>
        <label style={{fontSize:12,color:'#94a3b8',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={it.noAction||false} onChange={e=>ud({noAction:e.target.checked||undefined})}/> 行動消費なし</label>
      </div>
    </div>
    <div style={crd}><EffectsPanel effects={it.effects||[]} onChange={fx=>{ud({effects:fx});setDirty(true);}} counterNames={counterNames}/></div>
    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>
      <pre style={{background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:10,fontSize:11,color:'#94a3b8',overflow:'auto',maxHeight:200}}>{JSON.stringify(it,null,2)}</pre></details>
    {dirty&&<div className="save-bar"><button onClick={save} style={{...btnP,flex:1,background:'#3b82f6',color:'#fff'}}>✓ 保存</button><button onClick={discard} style={{...btnP,background:'#334155',color:'#94a3b8'}}>破棄</button></div>}
  </div>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569'}}>アイテムを選択</div>;
  return <DualLayout list={listV} detail={detV} sel={sel} onBack={()=>{setSel(null);setDraft(null);setDirty(false);}}/>;
}

// ═══ Monster Editor ═══
function MonsterEditor({monsters,setMonsters}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  function select(i){setSel(i);setDraft(i!=null?JSON.parse(JSON.stringify(monsters[i])):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function udsb(s,v){setDraft(p=>({...p,bonusSlots:{...(p.bonusSlots||{}),[s]:v}}));setDirty(true);}
  function save(){if(sel==null||!draft)return;setMonsters(p=>{const n=[...p];n[sel]=draft;return n;});setDirty(false);}
  function discard(){if(sel==null)return;setDraft(JSON.parse(JSON.stringify(monsters[sel])));setDirty(false);}
  function add(){setMonsters(p=>[...p,{name:'新魔物',hp:0,str:0,def:0,int:0,mov:0,bonusSlots:{},desc:''}]);select(monsters.length);}
  function del(){if(sel==null||!confirm(`"${draft?.name}"を削除?`))return;setMonsters(p=>p.filter((_,i)=>i!==sel));setSel(null);setDraft(null);setDirty(false);}
  const m=draft;
  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flex:1,overflowY:'auto',padding:8}}>
      {monsters.map((mm,i)=>(<div key={i} onClick={()=>select(i)} style={{padding:'8px 12px',marginBottom:3,borderRadius:6,cursor:'pointer',background:sel===i?'rgba(59,130,246,0.15)':'#1e293b',border:sel===i?'1px solid rgba(59,130,246,0.4)':'1px solid #334155'}}>
        <div style={{fontSize:13,fontWeight:600}}>{mm.name}</div>
        <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{mm.desc}</div>
        {sel===i&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
      </div>))}
    </div>
    <div style={{padding:12,borderTop:'1px solid #334155'}}><button onClick={add} style={{...btnP,width:'100%',background:'#3b82f6',color:'#fff'}}>+ 魔物追加</button></div>
  </div>);
  const detV=m?(<div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
      <h2 style={{fontSize:18,fontWeight:700,flex:1}}>{m.name}</h2>
      <button onClick={del} style={{...btnP,background:'rgba(239,68,68,0.15)',color:'#fca5a5',padding:'6px 12px',fontSize:12}}>削除</button>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>名前</div><input value={m.name} onChange={e=>ud({name:e.target.value})} style={iS}/>
      <div style={lbl}>ステータス補正</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['hp','str','def','int','mov'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',width:28}}>{s}</span>
        <input type="number" value={m[s]??0} onChange={e=>ud({[s]:+e.target.value})} style={iNum}/>
      </div>))}</div>
      <div style={lbl}>ボーナス枠</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['tech','skill','item'].map(s=>(<div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:'#94a3b8',width:40}}>{s}</span>
        <input type="number" value={m.bonusSlots?.[s]??0} onChange={e=>udsb(s,+e.target.value)} style={iNum}/>
      </div>))}</div>
      <div style={lbl}>説明</div><input value={m.desc||0} onChange={e=>ud({desc:e.target.value})} style={iS}/>
    </div>
    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>
      <pre style={{background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:10,fontSize:11,color:'#94a3b8',overflow:'auto',maxHeight:200}}>{JSON.stringify(m,null,2)}</pre></details>
    {dirty&&<div className="save-bar"><button onClick={save} style={{...btnP,flex:1,background:'#3b82f6',color:'#fff'}}>✓ 保存</button><button onClick={discard} style={{...btnP,background:'#334155',color:'#94a3b8'}}>破棄</button></div>}
  </div>):<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569'}}>魔物を選択</div>;
  return <DualLayout list={listV} detail={detV} sel={sel} onBack={()=>{setSel(null);setDraft(null);setDirty(false);}}/>;
}

// ═══ Trait Editor ═══
const TRAIT_CATS=[{id:'class',l:'兵種特性',c:'#f59e0b'},{id:'personal',l:'個人特性',c:'#8b5cf6'},{id:'movement',l:'タイプ特性',c:'#22c55e'}];
function TraitEditor({traits,setTraits,counterNames}){
  const [sel,setSel]=useState(null);const [draft,setDraft]=useState(null);const [dirty,setDirty]=useState(false);
  const [cFlt,setCFlt]=useState('');
  const ids=useMemo(()=>Object.keys(traits||{}),[traits]);
  const filtered=useMemo(()=>ids.filter(id=>{if(!cFlt)return true;return(traits[id].category||'')=== cFlt;}),[ids,cFlt,traits]);
  function select(id){setSel(id);setDraft(id?JSON.parse(JSON.stringify(traits[id])):null);setDirty(false);}
  function ud(u){setDraft(p=>({...p,...u}));setDirty(true);}
  function save(){if(!sel||!draft)return;setTraits(p=>({...p,[sel]:draft}));setDirty(false);}
  function discard(){if(!sel)return;setDraft(JSON.parse(JSON.stringify(traits[sel])));setDirty(false);}
  function add(){const id=prompt('特性ID:');if(!id||traits[id])return;setTraits(p=>({...p,[id]:{name:'',category:'personal',desc:'',effects:[]}}));select(id);}
  function ren(){if(!sel)return;const n=prompt('新しいID:',sel);if(!n||n===sel||traits[n])return;
    const saved=dirty?draft:traits[sel];
    setTraits(p=>{const o={};Object.keys(p).forEach(k=>{o[k===sel?n:k]=p[k];});if(dirty)o[n]=saved;return o;});setSel(n);setDraft(JSON.parse(JSON.stringify(saved)));setDirty(false);}
  function del(){if(!sel||!confirm(`"${sel}"を削除?`))return;setTraits(p=>{const o={...p};delete o[sel];return o;});setSel(null);setDraft(null);setDirty(false);}
  const t=draft;
  const listV=(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{padding:12,borderBottom:'1px solid #334155'}}>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        <button onClick={()=>setCFlt('')} style={chip(!cFlt,'#e2e8f0')}>全</button>
        {TRAIT_CATS.map(c=><button key={c.id} onClick={()=>setCFlt(c.id===cFlt?'':c.id)} style={chip(cFlt===c.id,c.c)}>{c.l}</button>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:8}}>
      {filtered.map(id=>{const tr=traits[id];const cat=TRAIT_CATS.find(c=>c.id===tr.category);
        return(<div key={id} onClick={()=>select(id)} style={{padding:'8px 12px',marginBottom:3,borderRadius:6,cursor:'pointer',background:sel===id?'rgba(59,130,246,0.15)':'#1e293b',border:sel===id?'1px solid rgba(59,130,246,0.4)':'1px solid #334155'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            {cat&&<span style={{fontSize:9,padding:'2px 5px',borderRadius:4,background:cat.c+'20',color:cat.c}}>{cat.l}</span>}
            <span style={{fontSize:13,fontWeight:600}}>{tr.name||id}</span>
            <span style={{fontSize:9,color:'#475569'}}>{id}</span>
            {(tr.effects||[]).length>0&&<span style={{fontSize:9,color:'#475569'}}>{tr.effects.length}fx</span>}
            {id===sel&&dirty&&<span style={{fontSize:9,color:'#f59e0b'}}>●</span>}
          </div>
          {tr.desc&&<div style={{fontSize:11,color:'#64748b',marginTop:2}}>{tr.desc}</div>}
        </div>);})}
    </div>

// ═══ Counter Editor ═══
function CounterEditor({counters,setCounters,counterNames}){
  const [sel,setSel]=useState(null);
  const list=counters.filter(c=>!c._comment);
  const c=sel!=null?list[sel]:null;
  function ud(patch){setCounters(prev=>{const n=[...prev];const ci=prev.indexOf(list[sel]);n[ci]={...n[ci],...patch};return n;});}
  function addC(){setCounters(prev=>[...prev,{name:'新カウンター',persistent:false,display:'full',max:99,effects:[]}]);setSel(list.length);}
  function delC(){if(!c||!confirm(c.name+'を削除？'))return;setCounters(prev=>prev.filter(x=>x!==list[sel]));setSel(null);}
  function reorder(from,to){
    setCounters(prev=>{
      const items=prev.filter(x=>!x._comment);
      const comments=prev.filter(x=>x._comment);
      const n=[...items];const [moved]=n.splice(from,1);n.splice(to,0,moved);
      if(sel===from)setSel(to);else if(sel!=null){if(from<sel&&to>=sel)setSel(sel-1);else if(from>sel&&to<=sel)setSel(sel+1);}
      return [...comments,...n];
    });
  }
  const listV=<div style={{padding:8}}>
    <button onClick={addC} style={{...btnP,width:'100%',marginBottom:8,background:'#3b82f6',color:'#fff'}}>+ 追加</button>
    {list.map((ct,i)=>(<ListItem key={ct.name+i} selected={sel===i} onClick={()=>setSel(i)} idx={i} onReorder={reorder}
      onUp={i>0?()=>reorder(i,i-1):undefined} onDown={i<list.length-1?()=>reorder(i,i+1):undefined}
      onDel={()=>{if(confirm(ct.name+'を削除？')){setCounters(prev=>prev.filter(x=>x!==list[i]));if(sel===i)setSel(null);else if(sel>i)setSel(sel-1);}}}
      first={i===0} last={i===list.length-1}>
      <div style={{fontSize:13,fontWeight:600,color:'#e2e8f0'}}>{ct.name}</div>
      <div style={{fontSize:10,color:'#64748b'}}>
        {ct.persistent?'持越':''}
        {ct.buff?<span style={{color:'#34d399'}}> バフ</span>:''}
        {ct.debuff?<span style={{color:'#fbbf24'}}> デバフ</span>:''}
        {ct.max&&ct.max!==99?` 上限${ct.max}`:''}
        {(ct.effects||[]).length>0?` 効果${(ct.effects||[]).length}`:''}
      </div>
    </ListItem>))}
  </div>;

  const detV=c?(<div style={{padding:16,overflowY:'auto',height:'100%'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontSize:16,fontWeight:700,color:'#e2e8f0'}}>{c.name}</span>
      <button onClick={delC} style={{...btnP,background:'rgba(239,68,68,0.15)',color:'#fca5a5',padding:'6px 12px',fontSize:12}}>削除</button>
    </div>
    <div style={crd}>
      <div style={{...lbl,marginTop:0}}>名前</div><input value={c.name} onChange={e=>ud({name:e.target.value})} style={iS}/>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:8}}>
        <label style={{fontSize:12,color:'#94a3b8',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={c.persistent||false} onChange={e=>ud({persistent:e.target.checked})}/> マップ間持越し</label>
        <label style={{fontSize:12,color:'#34d399',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={c.buff||false} onChange={e=>ud({buff:e.target.checked||undefined})}/> バフ</label>
        <label style={{fontSize:12,color:'#fbbf24',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={c.debuff||false} onChange={e=>ud({debuff:e.target.checked||undefined})}/> デバフ</label>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginTop:8}}>
        <span style={{fontSize:11,color:'#64748b'}}>表示:</span>
        <select value={c.display||'full'} onChange={e=>ud({display:e.target.value})} style={{...iSm,width:120}}>
          {DISPLAY_OPTS.map(o=><option key={o.id} value={o.id}>{o.l}</option>)}
        </select>
        <span style={{fontSize:11,color:'#64748b'}}>上限:</span>
        <input type="number" value={c.max??99} min={1} onChange={e=>ud({max:+e.target.value})} style={{...iNum,width:55}}/>
      </div>
      <div style={{marginTop:8}}>
        <span style={{fontSize:11,color:'#64748b'}}>status:</span>
        <input value={c.status||''} onChange={e=>ud({status:e.target.value||undefined})} style={{...iSm,width:120,marginLeft:6}} placeholder="なし"/>
        <span style={{fontSize:10,color:'#475569',marginLeft:6}}>エンジンが挙動判定に使うキー</span>
      </div>
    </div>
    <div style={crd}>
      <EffectsPanel effects={c.effects||[]} onChange={fx=>ud({effects:fx})} counterNames={counterNames}/>
    </div>
    <details style={{marginTop:8}}><summary style={{fontSize:11,color:'#475569',cursor:'pointer',padding:8}}>Raw JSON</summary>

// ═══ Main ═══
const TAB_NAMES=['技','スキル','抽選','地形','クラス','味方','敵','アイテム','魔物','特性','ミニオン','カウンター'];
const FILE_KEYS=Object.keys(ALL_FILES);
function App(){
  const [gd,setGd]=useState(null);const [tab,setTab]=useState(0);
  const [techs,setTechs]=useState({});const [parts,setParts]=useState([]);
  const [terrains,setTerrains]=useState([]);const [classData,setClassData]=useState({classes:{},midCC:{},advCC:{},traits:{}});
  const [units,setUnits]=useState([]);const [enemies,setEnemies]=useState({});
  const [items,setItems]=useState([]);const [monsters,setMonsters]=useState([]);
  const [traits,setTraits]=useState({});const [minions,setMinions]=useState({});const [counters,setCounters]=useState([]);
  function ready(d){
    const t={...(d.techs||{})};const tp=(d.parts||[]).filter(p=>p.type==='tech'&&p.techRef);
    for(const p of tp){if(t[p.techRef]&&!t[p.techRef].tag)t[p.techRef]={...t[p.techRef],tag:p.tag||'',rarity:p.rarity||''};}
    setTechs(t);setParts(d.parts||[]);
    setTerrains(d.terrains||[]);setClassData(d.classes||{classes:{},midCC:{},advCC:{},traits:{}});
    setUnits(d.units||[]);setEnemies(d.enemies||{});setItems(d.items||[]);setMonsters(d.monsters||[]);
    setTraits(d.traits||{});setMinions(d.minions||{});setCounters(d.counters||[]);
    setGd(d);
  }
  const dataMap={techs,parts,terrains,classes:classData,units,enemies,items,monsters,traits,minions,counters};
  const counterNames=counters.filter(c=>!c._comment&&c.name).map(c=>c.name);
  function exp(type){const data=dataMap[type];const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=type+'.json';a.click();URL.revokeObjectURL(u);}
  function imp(type){
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
      r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
        if(type==='techs')setTechs(d);else if(type==='parts')setParts(d);
        else if(type==='terrains')setTerrains(d);else if(type==='classes')setClassData(d);
        else if(type==='units')setUnits(d);else if(type==='enemies')setEnemies(d);
        else if(type==='items')setItems(d);else if(type==='monsters')setMonsters(d);
        else if(type==='traits')setTraits(d);else if(type==='minions')setMinions(d);else if(type==='counters')setCounters(d);
        alert(type+'.json を読み込みました');}catch(err){alert('Error: '+err.message);}};
      r.readAsText(f);};input.click();
  }
  async function expAll(){const z=new JSZip();for(const k of FILE_KEYS)z.file(k+'.json',JSON.stringify(dataMap[k],null,2));const b=await z.generateAsync({type:'blob'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='srpg_data.zip';a.click();URL.revokeObjectURL(u);}
  // ── GitHub 直接コミット ──
  const PAT_KEY='srpg1_gh_pat';
  function setPatPrompt(){
    const cur=localStorage.getItem(PAT_KEY)||'';
    const t=prompt('GitHub Personal Access Token を入力\n（Fine-grained: '+GH.repo+' リポジトリに Contents = Read and write 権限）\n※空欄で保存すると削除',cur);
    if(t===null)return;
    if(t.trim()===''){localStorage.removeItem(PAT_KEY);alert('トークンを削除した');}
    else{localStorage.setItem(PAT_KEY,t.trim());alert('トークンを保存した（このブラウザにのみ保存）');}
  }
  async function ghCommitAll(){
    let pat=localStorage.getItem(PAT_KEY)||'';
    if(!pat){setPatPrompt();pat=localStorage.getItem(PAT_KEY)||'';if(!pat)return;}
    const msg=prompt('コミットメッセージ','データ更新 (data-editor)');
    if(msg===null)return;
    const api=`https://api.github.com/repos/${GH.owner}/${GH.repo}`;
    const H={'Authorization':'Bearer '+pat,'Accept':'application/vnd.github+json','Content-Type':'application/json'};
    const chk=r=>{if(!r.ok)return r.text().then(t=>{throw new Error(r.status+' '+t.slice(0,200));});return r.json();};
    try{
      const ref=await fetch(`${api}/git/ref/heads/${GH.branch}`,{headers:H}).then(chk);
      const baseCommitSha=ref.object.sha;
      const baseCommit=await fetch(`${api}/git/commits/${baseCommitSha}`,{headers:H}).then(chk);
      const baseTreeSha=baseCommit.tree.sha;
      const tree=[];
      for(const k of FILE_KEYS){
        const content=JSON.stringify(dataMap[k],null,2)+'\n';
        const blob=await fetch(`${api}/git/blobs`,{method:'POST',headers:H,body:JSON.stringify({content,encoding:'utf-8'})}).then(chk);
        tree.push({path:`src/data/${k}.json`,mode:'100644',type:'blob',sha:blob.sha});
      }
      const newTree=await fetch(`${api}/git/trees`,{method:'POST',headers:H,body:JSON.stringify({base_tree:baseTreeSha,tree})}).then(chk);
      if(newTree.sha===baseTreeSha){alert('変更なし（コミットしなかった）');return;}
      const commit=await fetch(`${api}/git/commits`,{method:'POST',headers:H,body:JSON.stringify({message:msg,tree:newTree.sha,parents:[baseCommitSha]})}).then(chk);
      await fetch(`${api}/git/refs/heads/${GH.branch}`,{method:'PATCH',headers:H,body:JSON.stringify({sha:commit.sha})}).then(chk);
      alert('✅ コミット完了 '+commit.sha.slice(0,7)+'\nGitHub Actions が再ビルド開始（数分でゲームに反映）');
    }catch(err){alert('❌ コミット失敗: '+err.message+'\n\nトークンの権限(Contents:RW)とリポジトリ名を確認して');}
  }
  if(!gd)return<DataLoader onReady={ready}/>;
  return(<div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    <div style={{background:'#1e293b',borderBottom:'1px solid #334155',padding:'6px 10px',display:'flex',alignItems:'center',gap:6,flexShrink:0,flexWrap:'wrap'}}>
      <span style={{fontSize:13,fontWeight:700,color:'#64748b',letterSpacing:1,whiteSpace:'nowrap'}}>DATA EDITOR</span>
      <div style={{marginLeft:'auto',display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}>
        <select onChange={e=>{if(e.target.value){imp(e.target.value);e.target.value='';}}} defaultValue=""
          style={{width:78,padding:'3px 4px',fontSize:11,fontWeight:600,background:'#334155',color:'#94a3b8',border:'none',borderRadius:4,cursor:'pointer',minHeight:28,whiteSpace:'nowrap'}}>
          <option value="" disabled>📂 読込</option>
          {FILE_KEYS.map(k=><option key={k} value={k}>{k}.json</option>)}
        </select>
        <select onChange={e=>{if(e.target.value){exp(e.target.value);e.target.value='';}}} defaultValue=""
          style={{width:78,padding:'3px 4px',fontSize:11,fontWeight:600,background:'#334155',color:'#94a3b8',border:'none',borderRadius:4,cursor:'pointer',minHeight:28,whiteSpace:'nowrap'}}>
          <option value="" disabled>💾 保存</option>
          {FILE_KEYS.map(k=><option key={k} value={k}>{k}.json</option>)}
        </select>
        <button onClick={expAll} style={{padding:'3px 7px',fontSize:11,fontWeight:700,background:'#3b82f6',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',minHeight:28,whiteSpace:'nowrap'}}>💾 全保存</button>
        <button onClick={setPatPrompt} title="GitHubトークン設定" style={{padding:'3px 6px',fontSize:13,background:'#334155',color:'#94a3b8',border:'none',borderRadius:4,cursor:'pointer',minHeight:28}}>🔑</button>
        <button onClick={ghCommitAll} title="全データをGitHubにコミット" style={{padding:'3px 7px',fontSize:11,fontWeight:700,background:'#22c55e',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',minHeight:28,whiteSpace:'nowrap'}}>🚀 GitHub</button>
      </div>
    </div>
    <div style={{background:'#1e293b',borderBottom:'1px solid #334155',display:'flex',flexShrink:0,overflowX:'auto'}}>
      {TAB_NAMES.map((l,i)=>(<button key={i} onClick={()=>setTab(i)} style={{padding:'10px 12px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',borderBottom:tab===i?'2px solid #3b82f6':'2px solid transparent',background:'transparent',color:tab===i?'#e2e8f0':'#64748b',minHeight:44,whiteSpace:'nowrap',flexShrink:0}}>{l}</button>))}
    </div>
    <div style={{flex:1,overflow:'hidden'}}>
      {tab===0&&<TechEditor techs={techs} setTechs={setTechs} parts={parts} setParts={setParts} counterNames={counterNames}/>}
      {tab===1&&<SkillEditor parts={parts} setParts={setParts} counterNames={counterNames}/>}
      {tab===2&&<DraftEditor parts={parts} setParts={setParts} techs={techs} setTechs={setTechs} counterNames={counterNames}/>}
      {tab===3&&<TerrainEditor terrains={terrains} setTerrains={setTerrains} counterNames={counterNames}/>}
      {tab===4&&<ClassEditor classData={classData} setClassData={setClassData} traits={traits}/>}
      {tab===5&&<UnitEditor units={units} setUnits={setUnits} techs={techs} traits={traits}/>}
      {tab===6&&<EnemyEditor enemies={enemies} setEnemies={setEnemies} techs={techs} items={items} parts={parts}/>}
      {tab===7&&<ItemEditor items={items} setItems={setItems} counterNames={counterNames}/>}
      {tab===8&&<MonsterEditor monsters={monsters} setMonsters={setMonsters}/>}
      {tab===9&&<TraitEditor traits={traits} setTraits={setTraits} counterNames={counterNames}/>}
      {tab===10&&<MinionEditor minions={minions} setMinions={setMinions} techs={techs} counterNames={counterNames}/>}
      {tab===11&&<CounterEditor counters={counters} setCounters={setCounters} counterNames={counterNames}/>}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
