<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRPG Map Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;color:#e2e8f0;font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;user-select:none;overflow:hidden}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#1e293b}
  ::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
  input,select,textarea{font-family:inherit}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useCallback}=React;

// ── Constants ──
const TILE_SIZES=[16,20,24,28,32,36,40,48,56,64];
const MOVEMENTS=[{id:"rush",name:"突撃",short:"突"},{id:"reactive",name:"待機",short:"待"},{id:"fixed",name:"完全待機",short:"固"},{id:"flee",name:"逃避",short:"逃"}];
const ACTIONS=[{id:"attack",name:"攻撃優先",short:"攻"},{id:"support",name:"支援優先",short:"支"},{id:"debuff",name:"妨害優先",short:"妨"},{id:"techFocus",name:"技指定",short:"技"}];
const WIN_TYPES=[
  {id:"rout",name:"敵全滅"},{id:"boss",name:"ボス撃破"},
  {id:"survive",name:"ターン耐久"},{id:"arrive",name:"目標到達"},{id:"custom",name:"カスタム"}
];
const mkMap=(c,r,fill=0)=>Array.from({length:r},()=>Array(c).fill(fill));
const mkDZ=(c,r)=>Array.from({length:r},()=>Array(c).fill(false));
function cloneAction(a){
  const c={...a};
  if(a.units) c.units=a.units.map(u=>({...u}));
  if(a.lines) c.lines=a.lines.map(l=>({...l}));
  if(a.cells) c.cells=a.cells.map(c2=>({...c2}));
  if(a.targetIds) c.targetIds=[...a.targetIds];
  return c;
}
function cloneConditions(conds){
  if(!conds)return null;
  if(Array.isArray(conds)) return conds.map(c=>({...c}));
  return [{...conds}]; // migrate old single condition
}
function cloneEventsV2(ev){
  return ev.map(e=>({...e,trigger:{...e.trigger},
    conditions:cloneConditions(e.conditions||e.condition),
    actions:e.actions.map(a=>cloneAction(a))}));
}
const cloneZones=z=>{const o={};for(const k in z) o[k]=z[k].map(c=>({...c}));return o;};
const cloneState=s=>({
  terrain:s.terrain.map(r=>[...r]),
  deployZone:s.deployZone.map(r=>[...r]),
  enemies:s.enemies.map(e=>({...e,overrides:{...e.overrides}})),
  itemBoxes:s.itemBoxes.map(b=>({...b})),
  zones:s.zones?cloneZones(s.zones):{},
  events:s.events?cloneEventsV2(s.events):[],
  tileOverlay:s.tileOverlay?s.tileOverlay.map(layer=>layer.map(r=>[...r])):null,
});

// ── Data Loading Screen ──
function DataLoader({onReady}){
  const [status,setStatus]=useState({terrains:null,enemies:null,items:null});
  const [data,setData]=useState({terrains:null,enemies:null,items:null});
  const [loading,setLoading]=useState(true);
  const fileRefs={terrains:useRef(),enemies:useRef(),items:useRef()};

  useEffect(()=>{
    (async()=>{
      const paths={terrains:'../src/data/terrains.json',enemies:'../src/data/enemies.json',items:'../src/data/items.json'};
      const d={};const st={};let allOk=true;
      for(const [key,path] of Object.entries(paths)){
        try{
          const res=await fetch(path);
          if(!res.ok) throw new Error(res.status);
          d[key]=await res.json();st[key]='ok';
        }catch{d[key]=null;st[key]='fail';allOk=false;}
      }
      setData(d);setStatus(st);setLoading(false);
      if(allOk) onReady(d);
    })();
  },[]);

  function handleFile(key,e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        setData(prev=>({...prev,[key]:parsed}));
        setStatus(prev=>({...prev,[key]:'ok'}));
      }catch(err){alert('JSONパースエラー: '+err.message);}
    };
    reader.readAsText(f);
  }

  function canStart(){return status.terrains==='ok';}

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#64748b',fontSize:14}}>データ読み込み中...</div>;

  const allOk=Object.values(status).every(s=>s==='ok');
  if(allOk) return null;

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}>
      <div style={{background:'#1e293b',borderRadius:12,padding:32,border:'1px solid #334155',maxWidth:500,width:'100%'}}>
        <h2 style={{fontSize:16,marginBottom:8,color:'#f59e0b'}}>⚠ データ読み込み</h2>
        <p style={{fontSize:12,color:'#94a3b8',marginBottom:16}}>Viteサーバー経由の読み込みに失敗しました。<br/>以下のJSONファイルを手動で読み込んでください。</p>
        {[['terrains','terrains.json',true],['enemies','enemies.json',false],['items','items.json',false]].map(([key,label,required])=>(
          <div key={key} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
            <span style={{fontSize:12,width:120,color:'#e2e8f0'}}>{label}{required&&<span style={{color:'#f87171'}}> *</span>}:</span>
            <label style={{padding:'4px 12px',background:'#334155',color:'#94a3b8',borderRadius:4,fontSize:11,cursor:'pointer'}}>
              ファイル選択
              <input ref={fileRefs[key]} type="file" accept=".json" onChange={e=>handleFile(key,e)} style={{display:'none'}}/>
            </label>
            <span style={{fontSize:11,color:status[key]==='ok'?'#22c55e':'#64748b'}}>
              {status[key]==='ok'?'✓読み込み済':'✗未読み込み'}
            </span>
          </div>
        ))}
        <p style={{fontSize:10,color:'#64748b',marginBottom:12}}>terrains.jsonのみ必須。enemies/itemsは省略可（空で開始）。</p>
        <button disabled={!canStart()} onClick={()=>onReady(data)}
          style={{width:'100%',padding:'10px',fontSize:13,fontWeight:700,background:canStart()?'#3b82f6':'#334155',color:canStart()?'#fff':'#64748b',border:'none',borderRadius:6,cursor:canStart()?'pointer':'default'}}>
          エディタを開始
        </button>
      </div>
    </div>
  );
}

// ── Main Editor ──
function MapEditor({gameData}){
  const terrains=gameData.terrains||[];
  const enemyTemplates=useMemo(()=>{
    if(!gameData.enemies) return [];
    // enemies.json is object keyed by name
    return Object.entries(gameData.enemies).map(([name,v])=>({name,...v}));
  },[gameData.enemies]);
  const items=gameData.items||[];

  // ── State ──
  const [mapName,setMapName]=useState('新規マップ');
  const [cols,setCols]=useState(20);
  const [rows,setRows]=useState(15);
  const [terrain,setTerrain]=useState(()=>mkMap(20,15));
  const [deployZone,setDeployZone]=useState(()=>mkDZ(20,15));
  const [sortieLimit,setSortieLimit]=useState(6);
  const [enemies,setEnemies]=useState([]);
  const [itemBoxes,setItemBoxes]=useState([]);
  const [lootTables,setLootTables]=useState([]);
  const [selLootTable,setSelLootTable]=useState('');
  const [openLootIds,setOpenLootIds]=useState([]);
  const [objective,setObjective]=useState({type:'rout',targetId:'',turnLimit:10});
  const [zones,setZones]=useState({}); // {zoneId: [{x,y},...]}
  const [activeZone,setActiveZone]=useState('');
  const [mapBgm,setMapBgm]=useState({default:'',boss:'',tension:''});
  const [events,setEvents]=useState([]);
  const [selectedEvent,setSelectedEvent]=useState(null);
  const [tilesets,setTilesets]=useState([]); // [{id,src,dataUrl,tileW,tileH,cols,rows}]
  const [activeChipsetIdx,setActiveChipsetIdx]=useState(0);
  const [tileOverlay,setTileOverlay]=useState(null);
  const [activeLayer,setActiveLayer]=useState(0);
  const [layerVisible,setLayerVisible]=useState([true,true,true,true]);
  const [selTile,setSelTile]=useState(0); // encoded: chipsetIdx*10000+tileIndex
  const [palSelStart,setPalSelStart]=useState(null); // {col,row}
  const [palSelEnd,setPalSelEnd]=useState(null); // {col,row}
  const [palDragging,setPalDragging]=useState(false);
  const [overlayOpacity,setOverlayOpacity]=useState(1.0);
  const [coreOpacity,setCoreOpacity]=useState(0.3);
  const [palCols,setPalCols]=useState(8); // パレット列数 8 or 16
  const [bottomH,setBottomH]=useState(300); // 下部パネル高さ
  const [showMarkers,setShowMarkers]=useState(true);
  const [showEnemyMarkers,setShowEnemyMarkers]=useState(true);
  const [showItemMarkers,setShowItemMarkers]=useState(true);
  const [showDeployMarkers,setShowDeployMarkers]=useState(true);

  // UI state
  const [activeTab,setActiveTab]=useState(0);
  const [tool,setTool]=useState('terrain');
  const [selTerrain,setSelTerrain]=useState(0);
  const [selEnemy,setSelEnemy]=useState(enemyTemplates[0]?.name||'');
  const [selMovement,setSelMovement]=useState('rush');
  const [selAction,setSelAction]=useState('attack');
  const [tileSize,setTileSize]=useState(32);
  const [showGrid,setShowGrid]=useState(true);
  const [painting,setPainting]=useState(false);
  const [paintVal,setPaintVal]=useState(true);
  const [hovCell,setHovCell]=useState(null);
  const [selectedEnemy,setSelectedEnemy]=useState(null); // enemy id for property panel
  const [exported,setExported]=useState('');
  const [showExport,setShowExport]=useState(false);

  const uidRef=useRef(1);
  const evtUidRef=useRef(1);
  const overlayTabVisited=useRef(false);
  const canvasRefs=useRef([null,null,null,null]);
  const chipsetImgCache=useRef({}); // {dataUrl: HTMLImageElement}

  // ── Chipset image cache (localStorage) ──
  const CHIPSET_STORAGE_KEY='srpg_chipset_cache';
  function loadChipsetCache(){try{const raw=localStorage.getItem(CHIPSET_STORAGE_KEY);return raw?JSON.parse(raw):{};}catch{return{};}}
  function saveChipsetCache(cache){try{localStorage.setItem(CHIPSET_STORAGE_KEY,JSON.stringify(cache));}catch{}}
  function cacheChipset(src,dataUrl){const c=loadChipsetCache();c[src]=dataUrl;saveChipsetCache(c);}
  function getCachedChipset(src){return loadChipsetCache()[src]||null;}

  // Tile index encode/decode: chipsetIdx*10000+tileIndex
  function encodeTile(chipIdx,tileIdx){return chipIdx*10000+tileIdx;}
  function decodeTile(val){return {chipIdx:Math.floor(val/10000),tileIdx:val%10000};}
  function getChipsetForTile(val){return tilesets[Math.floor(val/10000)]||null;}

  // ── Undo/Redo ──
  const histRef=useRef([]);
  const histIdxRef=useRef(-1);
  const skipSnapRef=useRef(false);
  const [,forceRender]=useState(0);

  function snap(t,dz,en,ib,zn,ev,to){
    if(skipSnapRef.current){skipSnapRef.current=false;return;}
    const s={terrain:t.map(r=>[...r]),deployZone:dz.map(r=>[...r]),
      enemies:en.map(e=>({...e,overrides:{...e.overrides}})),
      itemBoxes:ib.map(b=>({...b})),
      zones:zn?cloneZones(zn):{},
      events:cloneEventsV2(ev||[]),
      tileOverlay:to?to.map(layer=>layer.map(r=>[...r])):null};
    histRef.current=histRef.current.slice(0,histIdxRef.current+1);
    histRef.current.push(s);
    if(histRef.current.length>80) histRef.current.shift();
    histIdxRef.current=histRef.current.length-1;
  }
  useEffect(()=>{snap(terrain,deployZone,enemies,itemBoxes,zones,events,tileOverlay);},[]);

  function restoreState(s){
    skipSnapRef.current=true;
    setTerrain(s.terrain.map(r=>[...r]));
    setDeployZone(s.deployZone.map(r=>[...r]));
    setEnemies(s.enemies.map(e=>({...e,overrides:{...e.overrides}})));
    setItemBoxes(s.itemBoxes.map(b=>({...b})));
    setZones(s.zones?cloneZones(s.zones):{});
    setEvents(s.events?cloneEventsV2(s.events):[]);
    setTileOverlay(s.tileOverlay?s.tileOverlay.map(layer=>layer.map(r=>[...r])):null);
    forceRender(n=>n+1);
  }
  function undo(){if(histIdxRef.current<=0)return;histIdxRef.current--;restoreState(histRef.current[histIdxRef.current]);}
  function redo(){if(histIdxRef.current>=histRef.current.length-1)return;histIdxRef.current++;restoreState(histRef.current[histIdxRef.current]);}

  function doSnap(){
    setTimeout(()=>{
      // Read latest from refs isn't possible with React state,
      // so we use a trick: call snap in setState callbacks
    },0);
  }

  // Helper: snapshot after state update
  function snapNow(t,dz,en,ib,zn,ev,to){
    setTimeout(()=>snap(t,dz,en,ib,zn!==undefined?zn:zones,ev||events,to!==undefined?to:tileOverlay),0);
  }

  // ── Resize ──
  function resizeMap(nc,nr){
    nc=Math.max(4,Math.min(50,nc));nr=Math.max(4,Math.min(50,nr));
    const newT=Array.from({length:nr},(_,y)=>Array.from({length:nc},(_,x)=>terrain[y]?.[x]??0));
    const newDZ=Array.from({length:nr},(_,y)=>Array.from({length:nc},(_,x)=>deployZone[y]?.[x]??false));
    const newEn=enemies.filter(e=>e.x<nc&&e.y<nr);
    const newIB=itemBoxes.filter(b=>b.x<nc&&b.y<nr);
    const newZn={};for(const k in zones) newZn[k]=zones[k].filter(c=>c.x<nc&&c.y<nr);
    const newTO=tileOverlay?tileOverlay.map(layer=>Array.from({length:nr},(_,y)=>Array.from({length:nc},(_,x)=>layer[y]?.[x]??0))):null;
    setTerrain(newT);setDeployZone(newDZ);setEnemies(newEn);setItemBoxes(newIB);setZones(newZn);
    if(newTO) setTileOverlay(newTO);
    setCols(nc);setRows(nr);
    snapNow(newT,newDZ,newEn,newIB,newZn,undefined,newTO);
  }

  // ── Map Shift ──
  const [shiftN,setShiftN]=useState(1);
  function shiftMap(dx,dy){
    if(dx===0&&dy===0) return;
    const newT=Array.from({length:rows},(_,y)=>Array.from({length:cols},(_,x)=>terrain[y-dy]?.[x-dx]??0));
    const newDZ=Array.from({length:rows},(_,y)=>Array.from({length:cols},(_,x)=>deployZone[y-dy]?.[x-dx]??false));
    const newTO=tileOverlay?tileOverlay.map(layer=>Array.from({length:rows},(_,y)=>Array.from({length:cols},(_,x)=>layer[y-dy]?.[x-dx]??0))):null;
    const newEn=enemies.map(e=>({...e,x:e.x+dx,y:e.y+dy})).filter(e=>e.x>=0&&e.x<cols&&e.y>=0&&e.y<rows);
    const newIB=itemBoxes.map(b=>({...b,x:b.x+dx,y:b.y+dy})).filter(b=>b.x>=0&&b.x<cols&&b.y>=0&&b.y<rows);
    const newZn={};for(const k in zones) newZn[k]=zones[k].map(c=>({x:c.x+dx,y:c.y+dy})).filter(c=>c.x>=0&&c.x<cols&&c.y>=0&&c.y<rows);
    const newEv=events.map(e=>({...e,actions:e.actions.map(a=>{
      if(a.type==='spawn'&&a.units){return{...a,units:a.units.map(u=>({...u,x:(u.x||0)+dx,y:(u.y||0)+dy})).filter(u=>u.x>=0&&u.x<cols&&u.y>=0&&u.y<rows)};}
      if(a.type==='terrainChange'&&a.cells){return{...a,cells:a.cells.map(c=>({...c,x:(c.x||0)+dx,y:(c.y||0)+dy})).filter(c=>c.x>=0&&c.x<cols&&c.y>=0&&c.y<rows)};}
      return a;
    })}));
    setTerrain(newT);setDeployZone(newDZ);if(newTO) setTileOverlay(newTO);
    setEnemies(newEn);setItemBoxes(newIB);setZones(newZn);setEvents(newEv);
    snapNow(newT,newDZ,newEn,newIB,newZn,newEv,newTO);
  }

  // ── Cell paint ──
  function paintCell(cx,cy,isFirst,button){
    if(cx<0||cy<0||cx>=cols||cy>=rows) return;

    if(tool==='terrain'){
      setTerrain(prev=>{
        const n=prev.map(r=>[...r]);n[cy][cx]=selTerrain;
        snapNow(n,deployZone,enemies,itemBoxes);return n;
      });
    }else if(tool==='deploy'){
      const val=isFirst?!deployZone[cy][cx]:paintVal;
      if(isFirst) setPaintVal(val);
      setDeployZone(prev=>{
        const n=prev.map(r=>[...r]);n[cy][cx]=val;
        snapNow(terrain,n,enemies,itemBoxes);return n;
      });
    }else if(tool==='zone'){
      if(!activeZone) return;
      const zoneArr=zones[activeZone]||[];
      const exists=zoneArr.some(c=>c.x===cx&&c.y===cy);
      const val=isFirst?!exists:paintVal;
      if(isFirst) setPaintVal(val);
      setZones(prev=>{
        const arr=(prev[activeZone]||[]).filter(c=>!(c.x===cx&&c.y===cy));
        if(val) arr.push({x:cx,y:cy});
        const next={...prev,[activeZone]:arr};
        snapNow(terrain,deployZone,enemies,itemBoxes,next);return next;
      });
    }else if(tool==='enemy'){
      const tmpl=enemyTemplates.find(t=>t.name===selEnemy);
      if(!tmpl) return;
      const id='e'+(uidRef.current++);
      const newE={id,template:selEnemy,x:cx,y:cy,ai:{movement:selMovement,action:selAction},level:tmpl.baseLv||1,overrides:{},group:[],label:''};
      setEnemies(prev=>{
        const next=[...prev.filter(e=>!(e.x===cx&&e.y===cy)),newE];
        snapNow(terrain,deployZone,next,itemBoxes);return next;
      });
    }else if(tool==='item'){
      const newB={x:cx,y:cy,tableId:selLootTable||''};
      setItemBoxes(prev=>{
        const next=[...prev.filter(b=>!(b.x===cx&&b.y===cy)),newB];
        snapNow(terrain,deployZone,enemies,next);return next;
      });
    }else if(tool==='erase'){
      const hadEnemy=enemies.find(e=>e.x===cx&&e.y===cy);
      const hadItem=itemBoxes.find(b=>b.x===cx&&b.y===cy);
      if(hadEnemy){
        setEnemies(prev=>{const next=prev.filter(e=>!(e.x===cx&&e.y===cy));
          snapNow(terrain,deployZone,next,itemBoxes);return next;});
      }else if(hadItem){
        setItemBoxes(prev=>{const next=prev.filter(b=>!(b.x===cx&&b.y===cy));
          snapNow(terrain,deployZone,enemies,next);return next;});
      }else{
        setTerrain(prev=>{const n=prev.map(r=>[...r]);n[cy][cx]=0;
          snapNow(n,deployZone,enemies,itemBoxes);return n;});
        setDeployZone(prev=>{const n=prev.map(r=>[...r]);n[cy][cx]=false;return n;});
      }
    }
  }

  function rightClickCell(e,cx,cy){
    e.preventDefault();
    const hadEnemy=enemies.find(en=>en.x===cx&&en.y===cy);
    if(hadEnemy){
      setEnemies(prev=>{const next=prev.filter(en=>en.id!==hadEnemy.id);
        snapNow(terrain,deployZone,next,itemBoxes);return next;});
      if(selectedEnemy===hadEnemy.id) setSelectedEnemy(null);
      return;
    }
    const hadItem=itemBoxes.find(b=>b.x===cx&&b.y===cy);
    if(hadItem){
      setItemBoxes(prev=>{const next=prev.filter(b=>!(b.x===cx&&b.y===cy));
        snapNow(terrain,deployZone,enemies,next);return next;});
    }
  }

  function middleClickCell(e,cx,cy){
    const en=enemies.find(u=>u.x===cx&&u.y===cy);
    if(!en) return;
    e.preventDefault();
    setEnemies(prev=>{
      const next=prev.map(u=>{
        if(u.id!==en.id) return u;
        const idx=MOVEMENTS.findIndex(b=>b.id===(u.ai?.movement||'rush'));
        return {...u,ai:{...(u.ai||{}),...{movement:MOVEMENTS[(idx+1)%MOVEMENTS.length].id}}};
      });
      snapNow(terrain,deployZone,next,itemBoxes);return next;
    });
  }

  // ── Keyboard shortcuts ──
  useEffect(()=>{
    const onKey=e=>{
      // Don't intercept when typing in inputs
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;

      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
      if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey)||(e.key==='Z'))){e.preventDefault();redo();return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();handleDownload();return;}

      const k=e.key.toLowerCase();
      if(k==='d'){setTool('deploy');return;}
      if(k==='e'){setTool('enemy');return;}
      if(k==='i'){setTool('item');return;}
      if(k==='z'&&!e.ctrlKey&&!e.metaKey){setTool('zone');return;}
      if(k==='b'){setTool('bgm');return;}
      if(k==='x'){setTool('erase');return;}
      if(k==='g'){setShowGrid(p=>!p);return;}
      if(k==='delete'){
        if(selectedEnemy){
          setEnemies(prev=>{const next=prev.filter(u=>u.id!==selectedEnemy);
            snapNow(terrain,deployZone,next,itemBoxes);return next;});
          setSelectedEnemy(null);
        }
        return;
      }
      if(k==='='||k==='+'){
        setTileSize(prev=>{const idx=TILE_SIZES.indexOf(prev);return idx<TILE_SIZES.length-1?TILE_SIZES[idx+1]:prev;});return;
      }
      if(k==='-'||k==='_'){
        setTileSize(prev=>{const idx=TILE_SIZES.indexOf(prev);return idx>0?TILE_SIZES[idx-1]:prev;});return;
      }
      // Number keys 1-9 for terrain
      const num=parseInt(k);
      if(num>=1&&num<=9&&num<=terrains.length){
        setTool('terrain');setSelTerrain(num-1);return;
      }
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  });

  // ── Export ──
  function buildExportData(){
    const dz=[];
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(deployZone[y]?.[x]) dz.push({x,y});

    const obj={type:objective.type};
    if(objective.type==='boss') obj.targetId=objective.targetId||'';
    if(objective.type==='survive') obj.turnLimit=objective.turnLimit||10;
    if(objective.type==='arrive') obj.zoneId=objective.zoneId||'';

    return {
      name:mapName,cols,rows,terrain,
      deployZone:dz,sortieLimit,
      enemies:enemies.map(e=>{const o={id:e.id,template:e.template,x:e.x,y:e.y,ai:e.ai||{movement:'rush',action:'attack'},level:e.level||1};if(e.overrides&&Object.keys(e.overrides).length)o.overrides=e.overrides;if(e.group&&e.group.length)o.group=e.group;if(e.label)o.label=e.label;return o;}),
      itemBoxes:itemBoxes.map(b=>({x:b.x,y:b.y,tableId:b.tableId||''})),
      lootTables:lootTables,
      zones:zones,
      bgm:mapBgm,
      objective:obj,
      events:events.map(e=>({id:e.id,name:e.name,trigger:e.trigger,conditions:e.conditions||null,once:e.once,actions:e.actions})),
      tilesets:tilesets.map(cs=>({src:cs.src,tileW:cs.tileW,tileH:cs.tileH,cols:cs.cols})),
      tileOverlay:tileOverlay
    };
  }

  function handleExport(){setExported(JSON.stringify(buildExportData(),null,2));setShowExport(true);}
  function handleDownload(){
    const b=new Blob([JSON.stringify(buildExportData(),null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');
    a.href=u;a.download=(mapName||'map_data')+'.json';a.click();URL.revokeObjectURL(u);
  }

  function loadMapData(d){
    if(d.name) setMapName(d.name);
    const nc=d.cols||20,nr=d.rows||15;
    setCols(nc);setRows(nr);
    if(d.terrain) setTerrain(d.terrain);
    else setTerrain(mkMap(nc,nr));

    if(d.sortieLimit) setSortieLimit(d.sortieLimit);

    const dz=mkDZ(nc,nr);
    if(d.deployZone) for(const c of d.deployZone){if(dz[c.y]) dz[c.y][c.x]=true;}
    setDeployZone(dz);

    // Enemies: handle old format (behavior) and new format (ai)
    if(d.enemies){
      let uid=1;
      const en=d.enemies.map((e,i)=>{
        let ai=e.ai;
        if(!ai&&e.behavior){ai={movement:e.behavior==='aggressive'?'rush':e.behavior==='stationary'?'reactive':'rush',action:'attack'};}
        if(!ai) ai={movement:'rush',action:'attack'};
        return {
          id:e.id||('e'+(uid++)),
          template:e.template,x:e.x,y:e.y,
          ai,
          level:e.level||1,
          overrides:e.overrides||{},
          group:Array.isArray(e.group)?e.group:e.group?[e.group]:[],
          label:e.label||''
        };
      });
      setEnemies(en);
      uidRef.current=uid+en.length;
    }else setEnemies([]);

    // ItemBoxes
    if(d.itemBoxes) setItemBoxes(d.itemBoxes.map(b=>({x:b.x,y:b.y,tableId:b.tableId||''})));
    else setItemBoxes([]);

    // Loot tables
    if(d.lootTables) setLootTables(d.lootTables);
    else if(d.itemLootTable&&d.itemLootTable.length>0){
      // Migrate old flat lootTable
      setLootTables([{id:'default',name:'デフォルト',maxUses:0,entries:d.itemLootTable}]);
    } else setLootTables([]);

    // Zones (named zones dict)
    if(d.zones) setZones(d.zones);
    else {
      // Migrate old arriveZone to zones
      const zn={};
      if(d.objective?.type==='arrive'&&d.objective.arriveZone){
        zn['arrive_default']=d.objective.arriveZone;
      }
      setZones(zn);
    }

    // BGM
    if(d.bgm) setMapBgm(d.bgm);
    else setMapBgm({default:'',boss:'',tension:''});

    // Objective
    if(d.objective){
      const obj={
        type:d.objective.type||'rout',
        targetId:d.objective.targetId||'',
        turnLimit:d.objective.turnLimit||10,
        zoneId:d.objective.zoneId||'',
      };
      // Migrate old arrive format
      if(d.objective.type==='arrive'&&!d.objective.zoneId&&d.objective.arriveZone){
        obj.zoneId='arrive_default';
      }
      setObjective(obj);
    }else{
      setObjective({type:'rout',targetId:'',turnLimit:10,zoneId:''});
    }

    // Tilesets & TileOverlay (with localStorage cache restore)
    function restoreChipsets(csArr){
      const restored=csArr.map((cs,i)=>{
        const cached=getCachedChipset(cs.src);
        const obj={id:i,src:cs.src,dataUrl:cached,tileW:cs.tileW,tileH:cs.tileH,cols:cs.cols,rows:0};
        if(cached){
          const img=new Image();
          img.onload=()=>{
            obj.rows=Math.floor(img.height/cs.tileH);
            obj.cols=Math.floor(img.width/cs.tileW);
            chipsetImgCache.current[cached]=img;
            forceRender(n=>n+1);
          };
          img.src=cached;
        }
        return obj;
      });
      setTilesets(restored);
    }
    if(d.tilesets&&d.tilesets.length>0){
      restoreChipsets(d.tilesets);
    }else if(d.tileset){
      restoreChipsets([d.tileset]);
    }else{
      setTilesets([]);
    }
    setActiveChipsetIdx(0);
    if(d.tileOverlay){
      if(Array.isArray(d.tileOverlay[0]?.[0])){
        setTileOverlay(d.tileOverlay);
      }else{
        const nc2=d.cols||20,nr2=d.rows||15;
        setTileOverlay([d.tileOverlay,mkMap(nc2,nr2,0),mkMap(nc2,nr2,0),mkMap(nc2,nr2,0)]);
      }
    }else setTileOverlay(null);

    // Events - migrate condition→conditions
    if(d.events){
      const evts=d.events.map((e,i)=>({
        id:e.id||('evt_'+(i+1)),
        name:e.name||'',
        trigger:e.trigger||{type:'mapStart'},
        conditions:e.conditions||(e.condition?[e.condition]:null),
        once:e.once!==undefined?e.once:true,
        actions:e.actions||[]
      }));
      setEvents(evts);
      let maxEvt=0;
      evts.forEach(e=>{const m=e.id.match(/evt_(\d+)/);if(m) maxEvt=Math.max(maxEvt,+m[1]);});
      evtUidRef.current=maxEvt+1;
    }else setEvents([]);
    setSelectedEvent(null);

    // Reset history
    histRef.current=[];histIdxRef.current=-1;
    skipSnapRef.current=false;
    setTimeout(()=>{
      forceRender(n=>n+1);
    },100);
  }

  function handleFileImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{loadMapData(JSON.parse(ev.target.result));}catch(err){alert('読み込み失敗: '+err.message);}};
    r.readAsText(f);e.target.value='';
  }
  function handleTextImport(){

    try{loadMapData(JSON.parse(input));}catch(err){alert('パース失敗: '+err.message);}

  // ── Enemy property update ──
  function updateEnemy(id,updates){
    setEnemies(prev=>{
      const next=prev.map(e=>e.id===id?{...e,...updates}:e);
      snapNow(terrain,deployZone,next,itemBoxes);return next;
    });

  // ── Overlay helpers ──
  function getPalRect(){
    if(!palSelStart||!palSelEnd) return null;
    const cs=tilesets[activeChipsetIdx];if(!cs) return null;
    const c1=Math.min(palSelStart.col,palSelEnd.col),c2=Math.max(palSelStart.col,palSelEnd.col);
    const r1=Math.min(palSelStart.row,palSelEnd.row),r2=Math.max(palSelStart.row,palSelEnd.row);
    const w=c2-c1+1,h=r2-r1+1;
    if(w===1&&h===1) return null;
    const tiles=[];
    for(let r=r1;r<=r2;r++){const row=[];for(let c=c1;c<=c2;c++){row.push(encodeTile(activeChipsetIdx,r*cs.cols+c+1));}tiles.push(row);}
    return{w,h,tiles};
  }
  function paintOverlayCell(cx,cy){
    if(!tileOverlay||cx<0||cy<0||cx>=cols||cy>=rows) return;
    setTileOverlay(prev=>{
      const n=prev.map(layer=>layer.map(r=>[...r]));
      const rect=getPalRect();
      if(rect){
        for(let dy=0;dy<rect.h;dy++){for(let dx=0;dx<rect.w;dx++){
          const tx=cx+dx,ty=cy+dy;
          if(tx<cols&&ty<rows) n[activeLayer][ty][tx]=rect.tiles[dy][dx];
        }}
      }else{
        n[activeLayer][cy][cx]=selTile;
      }
      snapNow(terrain,deployZone,enemies,itemBoxes,zones,events,n);return n;
    });
  }
  function spoitTile(cx,cy){
    if(!tileOverlay) return;
    const idx=tileOverlay[activeLayer]?.[cy]?.[cx]||0;
    setSelTile(idx);
    // Switch to that chipset
    if(idx>0){
      const {chipIdx}=decodeTile(idx);
      if(chipIdx>=0&&chipIdx<tilesets.length) setActiveChipsetIdx(chipIdx);
    }
  }
  function addChipset(file,tileW,tileH){
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const tCols=Math.floor(img.width/tileW);
        const tRows=Math.floor(img.height/tileH);
        const newCs={id:tilesets.length,src:file.name,dataUrl:ev.target.result,tileW,tileH,cols:tCols,rows:tRows};
        setTilesets(prev=>[...prev,newCs]);
        setActiveChipsetIdx(tilesets.length);
        if(!tileOverlay) setTileOverlay([mkMap(cols,rows,0),mkMap(cols,rows,0),mkMap(cols,rows,0),mkMap(cols,rows,0)]);
        chipsetImgCache.current[ev.target.result]=img;
        cacheChipset(file.name,ev.target.result);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  function reloadChipsetImage(idx,file){
    const cs=tilesets[idx];if(!cs) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const tCols=Math.floor(img.width/cs.tileW);
        const tRows=Math.floor(img.height/cs.tileH);
        setTilesets(prev=>prev.map((c,i)=>i===idx?{...c,dataUrl:ev.target.result,cols:tCols,rows:tRows,src:file.name}:c));
        chipsetImgCache.current[ev.target.result]=img;
        cacheChipset(file.name,ev.target.result);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  function removeChipset(idx){
    if(!confirm(`チップセット${idx}を削除しますか？\n使用中のタイルは消去されます。`)) return;
    // Remove tiles referencing this chipset from overlay
    if(tileOverlay){
      setTileOverlay(prev=>{
        const n=prev.map(layer=>layer.map(row=>row.map(val=>{
          const {chipIdx,tileIdx}=decodeTile(val);
          if(chipIdx===idx) return 0;
          if(chipIdx>idx) return encodeTile(chipIdx-1,tileIdx);
          return val;
        })));
        snapNow(terrain,deployZone,enemies,itemBoxes,zones,events,n);return n;
      });
    }
    setTilesets(prev=>prev.filter((_,i)=>i!==idx).map((c,i)=>({...c,id:i})));
    setActiveChipsetIdx(a=>a>=idx&&a>0?a-1:a);
    setSelTile(0);
  }
  // Auto-zoom on first overlay tab visit
  useEffect(()=>{
    if(activeTab===1&&!overlayTabVisited.current&&tilesets.length>0){
      setTileSize(48);overlayTabVisited.current=true;
    }
  },[activeTab,tilesets]);

  // Canvas overlay drawing
  const overlayCanvasRef=useRef(null);
  useEffect(()=>{
    const canvas=overlayCanvasRef.current;
    if(!canvas||!tileOverlay||tilesets.length===0) return;
    const w=cols*tileSize,h=rows*tileSize;
    if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,w,h);
    ctx.imageSmoothingEnabled=false;
    for(let li=0;li<4;li++){
      if(!layerVisible[li]) continue;
      const layer=tileOverlay[li];if(!layer) continue;
      ctx.globalAlpha=overlayOpacity;
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const val=layer[y]?.[x]||0;
          if(val===0) continue;
          const {chipIdx,tileIdx}=decodeTile(val);
          const cs=tilesets[chipIdx];
          if(!cs||!cs.dataUrl) continue;
          let img=chipsetImgCache.current[cs.dataUrl];
          if(!img) continue;
          const sx=((tileIdx-1)%cs.cols)*cs.tileW;
          const sy=Math.floor((tileIdx-1)/cs.cols)*cs.tileH;
          ctx.drawImage(img,sx,sy,cs.tileW,cs.tileH,x*tileSize,y*tileSize,tileSize,tileSize);
        }
      }
    }
    ctx.globalAlpha=1;
  },[tileOverlay,tilesets,layerVisible,overlayOpacity,tileSize,cols,rows,activeTab]);

  // ── Event helpers ──
  function evSnap(newEv){snapNow(terrain,deployZone,enemies,itemBoxes,zones,newEv);}
  function addEvent(){
    const id='evt_'+(evtUidRef.current++);
    const ev={id,name:'新規イベント',trigger:{type:'turn',turn:1,phase:'enemy'},conditions:null,once:true,actions:[]};
    const next=[...events,ev];setEvents(next);setSelectedEvent(id);evSnap(next);
  }
  function removeEvent(id){
    if(!confirm('このイベントを削除しますか？'))return;
    const next=events.filter(e=>e.id!==id);setEvents(next);
    if(selectedEvent===id)setSelectedEvent(null);evSnap(next);
  }
  function updateEvent(id,updates){
    const next=events.map(e=>e.id===id?{...e,...updates}:e);setEvents(next);evSnap(next);
  }
  function moveEvent(id,dir){
    const idx=events.findIndex(e=>e.id===id);if(idx<0)return;
    const ni=idx+dir;if(ni<0||ni>=events.length)return;
    const next=[...events];[next[idx],next[ni]]=[next[ni],next[idx]];setEvents(next);evSnap(next);
  }
  function addAction(evtId,type){
    const defaults={
      spawn:{type:'spawn',units:[]},
      despawn:{type:'despawn',targetIds:[]},
      dialogue:{type:'dialogue',lines:[]},
      terrainChange:{type:'terrainChange',cells:[]},
      objective:{type:'objective',result:'win'},
      setFlag:{type:'setFlag',flag:'',value:'true'},
      bgm:{type:'bgm',track:'',priority:false,fade:0,resume:false},
      camera:{type:'camera',x:0,y:0,duration:500},
      changeAI:{type:'changeAI',target:'',ai:{movement:'rush',action:'attack'}},
    };
    const act=defaults[type]||{type};
    const ev=events.find(e=>e.id===evtId);if(!ev)return;
    const next=events.map(e=>e.id===evtId?{...e,actions:[...e.actions,act]}:e);
    setEvents(next);evSnap(next);
  }
  function removeAction(evtId,actIdx){
    const next=events.map(e=>{
      if(e.id!==evtId)return e;
      return {...e,actions:e.actions.filter((_,i)=>i!==actIdx)};
    });setEvents(next);evSnap(next);
  }
  function updateAction(evtId,actIdx,updates){
    const next=events.map(e=>{
      if(e.id!==evtId)return e;
      return {...e,actions:e.actions.map((a,i)=>i===actIdx?{...a,...updates}:a)};
    });setEvents(next);evSnap(next);
  }
  function moveAction(evtId,actIdx,dir){
    const ev=events.find(e=>e.id===evtId);if(!ev)return;
    const ni=actIdx+dir;if(ni<0||ni>=ev.actions.length)return;
    const acts=[...ev.actions];[acts[actIdx],acts[ni]]=[acts[ni],acts[actIdx]];
    const next=events.map(e=>e.id===evtId?{...e,actions:acts}:e);setEvents(next);evSnap(next);
  }

  // ── Datalist for events ──

  // ── Derived values ──

  // ── Styles ──
  const lbl={fontSize:10,color:'#64748b',marginBottom:2,marginTop:8};

                        const r1=Math.min(palSelStart.row,palSelEnd.row),r2=Math.max(palSelStart.row,palSelEnd.row);
                        return palCol>=c1&&palCol<=c2&&palRow>=r1&&palRow<=r2;
                      })();
                      return(
                        <div key={tIdx}
                          onMouseDown={e=>{
                            e.preventDefault();
                            setPalSelStart({col:palCol,row:palRow});
                            setPalSelEnd({col:palCol,row:palRow});
                            setPalDragging(true);
                            setSelTile(encoded);
                          }}
                          onMouseEnter={()=>{if(palDragging) setPalSelEnd({col:palCol,row:palRow});}}
                          onMouseUp={()=>{
                            setPalDragging(false);
                            if(palSelStart?.col===palCol&&palSelStart?.row===palRow){
                              setPalSelStart(null);setPalSelEnd(null);
                            }
                          }}
                          style={{width:PAL_TILE,height:PAL_TILE,cursor:'pointer',
                            backgroundImage:`url(${activeCs.dataUrl})`,
                            backgroundPosition:`-${tx*(PAL_TILE/activeCs.tileW)}px -${ty*(PAL_TILE/activeCs.tileH)}px`,
                            backgroundSize:`${activeCs.cols*PAL_TILE}px auto`,
                            border:inRect?'2px solid #f59e0b':selTile===encoded?'2px solid #3b82f6':'1px solid #334155',
                            borderRadius:1,flexShrink:0,imageRendering:'pixelated'}}/>
                      );
                    })}
                  </div>
                </div>
              </React.Fragment>
              ):(
              <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569',fontSize:11}}>
                {activeCs?'画像を読み込んでください':'チップセットを追加してください'}
              </div>
              )}
            </div>
          </div>
        </div>
        );
      })()}

      {/* ── Tab 3: Event Editor ── */}
      {activeTab===2&&(()=>{
        const selEvt=selectedEvent?events.find(e=>e.id===selectedEvent):null;
        const triggerSummary=(tr)=>{
          if(!tr)return'';
          switch(tr.type){
            case'turn':return`turn T${tr.turn||1}/${tr.phase||'enemy'}`;
            case'turnEnd':return`turnEnd T${tr.turn||1}/${tr.phase||'enemy'}`;
            case'defeat':return`defeat ${tr.targetId||'?'}`;
            case'defeatGroup':return`defeatGroup ${tr.group||'?'}`;
            case'defeatCount':return`defeatCount ${tr.count||0}`;
            case'arrive':return`arrive zone:${tr.zoneId||'?'}`;
            case'hpBelow':return`hpBelow ${tr.targetId||'?'} ${tr.hpPct||50}%`;
            case'flag':return`flag ${tr.flag||'?'}=${tr.value??'true'}`;
            case'mapStart':return'mapStart';
            case'custom':return'custom';
            default:return tr.type;
          }
        };
        const triggerTypes=[
          {id:'turn',name:'ターン開始'},{id:'turnEnd',name:'ターン終了'},
          {id:'defeat',name:'撃破'},{id:'defeatGroup',name:'グループ全滅'},
          {id:'defeatCount',name:'撃破数'},{id:'arrive',name:'到達'},
          {id:'hpBelow',name:'HP低下'},{id:'flag',name:'フラグ'},
          {id:'mapStart',name:'マップ開始'},{id:'custom',name:'カスタム'}
        ];
        const condTypes=[
          {id:'none',name:'なし（無条件）'},{id:'flag',name:'フラグ条件'},
          {id:'probability',name:'確率'},{id:'unitStat',name:'ユニットステータス'},
          {id:'allyCount',name:'味方数'},{id:'enemyCount',name:'敵数'},
          {id:'unitAlive',name:'ユニット生存'},{id:'unitDead',name:'ユニット撃破済み'}
        ];
        const actionTypes=[
          {id:'spawn',name:'増援出現'},{id:'despawn',name:'ユニット消滅'},
          {id:'dialogue',name:'会話'},{id:'terrainChange',name:'地形変更'},
          {id:'objective',name:'勝敗判定'},{id:'setFlag',name:'フラグ設定'},
          {id:'bgm',name:'BGM変更'},{id:'camera',name:'カメラ移動'},
          {id:'changeAI',name:'AI変更'}
        ];
        const changeTriggerType=(newType)=>{
          const defaults={
            turn:{type:'turn',turn:1,phase:'enemy'},
            turnEnd:{type:'turnEnd',turn:1,phase:'enemy'},
            defeat:{type:'defeat',targetId:''},
            defeatGroup:{type:'defeatGroup',group:''},
            defeatCount:{type:'defeatCount',count:1},
            arrive:{type:'arrive',who:'player',zoneId:''},
            hpBelow:{type:'hpBelow',targetId:'',hpPct:50},
            flag:{type:'flag',flag:'',value:'true'},
            mapStart:{type:'mapStart'},
            custom:{type:'custom',expr:''},
          };
          updateEvent(selectedEvent,{trigger:defaults[newType]||{type:newType}});
        };
        const addCond=(type)=>{
          const defaults={
            flag:{type:'flag',flag:'',value:'true'},
            probability:{type:'probability',mode:'fixed',value:50},
            unitStat:{type:'unitStat',targetId:'',stat:'int',op:'>=',value:10},
            allyCount:{type:'allyCount',op:'<=',value:3},
            enemyCount:{type:'enemyCount',op:'<=',value:0},
            unitAlive:{type:'unitAlive',targetId:''},
            unitDead:{type:'unitDead',targetId:''},
          };
          const newCond=defaults[type]||{type};
          const cur=selEvt.conditions||[];
          updateEvent(selectedEvent,{conditions:[...cur,newCond]});
        };
        const removeCond=(ci)=>{
          const cur=(selEvt.conditions||[]).filter((_,i)=>i!==ci);
          updateEvent(selectedEvent,{conditions:cur.length>0?cur:null});
        };
        const updateCondAt=(ci,updates)=>{
          const cur=[...(selEvt.conditions||[])];
          cur[ci]={...cur[ci],...updates};
          updateEvent(selectedEvent,{conditions:cur});
        };
        const updateTrigger=(updates)=>{
          if(!selEvt)return;
          updateEvent(selectedEvent,{trigger:{...selEvt.trigger,...updates}});
        };

        const cardS={background:'#1e293b',border:'1px solid #334155',borderRadius:6,padding:10,marginBottom:8};
        const secH={fontSize:12,fontWeight:700,color:'#94a3b8',marginBottom:6};
        const rowS={display:'flex',alignItems:'center',gap:6,marginBottom:4};
        const fLbl={fontSize:10,color:'#64748b',minWidth:50,flexShrink:0};
        const smBtn=(bg,c)=>({padding:'3px 8px',fontSize:10,fontWeight:600,background:bg,color:c,border:'none',borderRadius:3,cursor:'pointer'});

        return(
        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          {/* datalists */}
          <datalist id="dl-enemy-ids">{enemyIds.map(id=><option key={id} value={id}/>)}</datalist>
          <datalist id="dl-enemy-groups">{enemyGroups.map(g=><option key={g} value={g}/>)}</datalist>

          {/* Left: Event List */}
          <div style={{width:200,background:'#1e293b',borderRight:'1px solid #334155',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
            <div style={{padding:'10px 10px 6px',borderBottom:'1px solid #334155'}}>
              <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0',marginBottom:6}}>イベント</div>
              <button onClick={addEvent} style={{width:'100%',padding:'5px',fontSize:11,fontWeight:600,background:'#3b82f6',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>+ 追加</button>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:4}}>
              {events.map((ev,idx)=>(
                <div key={ev.id} onClick={()=>setSelectedEvent(ev.id)}
                  style={{padding:'6px 8px',marginBottom:2,borderRadius:4,cursor:'pointer',
                    background:selectedEvent===ev.id?'rgba(59,130,246,0.2)':'transparent',
                    border:selectedEvent===ev.id?'1px solid rgba(59,130,246,0.4)':'1px solid transparent'}}>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span style={{fontSize:9,color:'#475569'}}>{ev.id}</span>
                    <div style={{marginLeft:'auto',display:'flex',gap:2}}>
                      <button onClick={e=>{e.stopPropagation();moveEvent(ev.id,-1);}} disabled={idx===0}
                        style={{...smBtn('#334155',idx===0?'#334155':'#94a3b8'),padding:'1px 4px',fontSize:9}}>↑</button>
                      <button onClick={e=>{e.stopPropagation();moveEvent(ev.id,1);}} disabled={idx===events.length-1}
                        style={{...smBtn('#334155',idx===events.length-1?'#334155':'#94a3b8'),padding:'1px 4px',fontSize:9}}>↓</button>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'#e2e8f0',fontWeight:600,marginTop:2}}>{ev.name||'(無名)'}</div>
                  <div style={{fontSize:9,color:'#64748b',marginTop:1}}>{triggerSummary(ev.trigger)}</div>
                </div>
              ))}
              {events.length===0&&<div style={{fontSize:10,color:'#475569',textAlign:'center',padding:16}}>イベントなし</div>}
            </div>
          </div>

          {/* Right: Event Detail */}
          <div style={{flex:1,overflowY:'auto',background:'#0f172a',padding:16}}>
            {!selEvt?(
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#475569',fontSize:13}}>
                イベントを選択または追加してください
              </div>
            ):(
              <div style={{maxWidth:700}}>
                {/* Header */}
                <div style={cardS}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>イベント: {selEvt.id}</span>
                    <button onClick={()=>removeEvent(selEvt.id)} style={smBtn('rgba(239,68,68,0.2)','#fca5a5')}>削除</button>
                  </div>
                  <div style={rowS}>
                    <span style={fLbl}>名前:</span>
                    <input value={selEvt.name} onChange={e=>updateEvent(selectedEvent,{name:e.target.value})}
                      style={{...iS,flex:1}}/>
                  </div>
                  <div style={rowS}>
                    <span style={fLbl}>1回のみ:</span>
                    <input type="checkbox" checked={selEvt.once} onChange={e=>updateEvent(selectedEvent,{once:e.target.checked})}/>
                  </div>
                </div>

                {/* Trigger */}
                <div style={cardS}>
                  <div style={secH}>トリガー</div>
                  <div style={rowS}>
                    <span style={fLbl}>タイプ:</span>
                    <select value={selEvt.trigger.type} onChange={e=>changeTriggerType(e.target.value)}
                      style={{...iS,flex:1,cursor:'pointer'}}>
                      {triggerTypes.map(t=><option key={t.id} value={t.id}>{t.name} ({t.id})</option>)}
                    </select>
                  </div>
                  {(selEvt.trigger.type==='turn'||selEvt.trigger.type==='turnEnd')&&(<>
                    <div style={rowS}>
                      <span style={fLbl}>ターン:</span>
                      <input type="number" value={selEvt.trigger.turn||1} min={1}
                        onChange={e=>updateTrigger({turn:+e.target.value})} style={{...iS,width:50}}/>
                      <span style={fLbl}>フェーズ:</span>
                      <select value={selEvt.trigger.phase||'enemy'} onChange={e=>updateTrigger({phase:e.target.value})}
                        style={{...iS,width:80,cursor:'pointer'}}>
                        <option value="player">player</option><option value="enemy">enemy</option>
                      </select>
                    </div>
                  </>)}
                  {selEvt.trigger.type==='defeat'&&(
                    <div style={rowS}>
                      <span style={fLbl}>対象ID:</span>
                      <input list="dl-enemy-ids" value={selEvt.trigger.targetId||''}
                        onChange={e=>updateTrigger({targetId:e.target.value})} style={{...iS,flex:1}}/>
                    </div>
                  )}
                  {selEvt.trigger.type==='defeatGroup'&&(
                    <div style={rowS}>
                      <span style={fLbl}>グループ:</span>
                      <input list="dl-enemy-groups" value={selEvt.trigger.group||''}
                        onChange={e=>updateTrigger({group:e.target.value})} style={{...iS,flex:1}}/>
                    </div>
                  )}
                  {selEvt.trigger.type==='defeatCount'&&(
                    <div style={rowS}>
                      <span style={fLbl}>撃破数:</span>
                      <input type="number" value={selEvt.trigger.count||1} min={1}
                        onChange={e=>updateTrigger({count:+e.target.value})} style={{...iS,width:60}}/>
                    </div>
                  )}
                  {selEvt.trigger.type==='arrive'&&(<>
                    <div style={rowS}>
                      <span style={fLbl}>対象:</span>
                      <select value={selEvt.trigger.who||'player'} onChange={e=>updateTrigger({who:e.target.value})}
                        style={{...iS,width:80,cursor:'pointer'}}>
                        <option value="player">player</option><option value="any">any</option>
                      </select>
                    </div>
                    <div style={rowS}>
                      <span style={fLbl}>ゾーン:</span>
                      <select value={selEvt.trigger.zoneId||''} onChange={e=>updateTrigger({zoneId:e.target.value})}
                        style={{...iS,flex:1,cursor:'pointer'}}>
                        <option value="">-- 選択 --</option>
                        {Object.keys(zones).map(zid=><option key={zid} value={zid}>{zid} ({(zones[zid]||[]).length}マス)</option>)}
                      </select>
                    </div>
                  </>)}
                  {selEvt.trigger.type==='flag'&&(<>
                    <div style={rowS}>
                      <span style={fLbl}>フラグ名:</span>
                      <input value={selEvt.trigger.flag||''} onChange={e=>updateTrigger({flag:e.target.value})} style={{...iS,flex:1}}/>
                    </div>
                    <div style={rowS}>
                      <span style={fLbl}>値:</span>
                      <input value={selEvt.trigger.value??'true'} onChange={e=>updateTrigger({value:e.target.value})} style={{...iS,flex:1}}/>
                    </div>
                  </>)}
                  {selEvt.trigger.type==='hpBelow'&&(
                    <div style={rowS}>
                      <span style={fLbl}>対象ID:</span>
                      <input list="dl-enemy-ids" value={selEvt.trigger.targetId||''}
                        onChange={e=>updateTrigger({targetId:e.target.value})} style={{...iS,width:100}}/>
                      <span style={fLbl}>HP%:</span>
                      <input type="number" value={selEvt.trigger.hpPct||50} min={1} max={100}
                        onChange={e=>updateTrigger({hpPct:+e.target.value})} style={{...iS,width:50}}/>
                    </div>
                  )}
                  {selEvt.trigger.type==='custom'&&(
                    <div style={rowS}>
                      <span style={fLbl}>式:</span>
                      <input value={selEvt.trigger.expr||''} onChange={e=>updateTrigger({expr:e.target.value})}
                        style={{...iS,flex:1}} placeholder="将来用"/>
                    </div>
                  )}
                </div>

                {/* Conditions (array, AND) */}
                <div style={cardS}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <div style={secH}>追加条件 ({(selEvt.conditions||[]).length}) <span style={{fontWeight:400,fontSize:10}}>AND結合</span></div>
                    <select onChange={e=>{if(e.target.value){addCond(e.target.value);e.target.value='';}}}
                      style={{...iS,width:130,cursor:'pointer',fontSize:10}} defaultValue="">
                      <option value="" disabled>+ 条件追加...</option>
                      {condTypes.filter(c=>c.id!=='none').map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  </div>
                  {(selEvt.conditions||[]).length===0&&<div style={{fontSize:10,color:'#475569',textAlign:'center',padding:4}}>無条件</div>}
                  {(selEvt.conditions||[]).map((cond,ci)=>{
                    const cName=condTypes.find(c=>c.id===cond.type)?.name||cond.type;
                    return(
                    <div key={ci} style={{background:'#0f172a',border:'1px solid #334155',borderRadius:4,padding:8,marginBottom:4}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <span style={{fontSize:10,fontWeight:700,color:'#94a3b8'}}>[{ci+1}] {cName}</span>
                        <button onClick={()=>removeCond(ci)} style={smBtn('rgba(239,68,68,0.2)','#fca5a5')}>×</button>
                      </div>

                      {cond.type==='flag'&&(<>
                        <div style={rowS}>
                          <span style={fLbl}>フラグ名:</span>
                          <input value={cond.flag||''} onChange={e=>updateCondAt(ci,{flag:e.target.value})} style={{...iS,flex:1}}/>
                        </div>
                        <div style={rowS}>
                          <span style={fLbl}>値:</span>
                          <input value={cond.value??''} onChange={e=>updateCondAt(ci,{value:e.target.value})} style={{...iS,flex:1}}/>
                        </div>
                      </>)}

                      {cond.type==='probability'&&(<>
                        <div style={rowS}>
                          <span style={fLbl}>モード:</span>
                          <select value={cond.mode||'fixed'} onChange={e=>updateCondAt(ci,{mode:e.target.value})}
                            style={{...iS,width:100,cursor:'pointer'}}>
                            <option value="fixed">固定%</option>
                            <option value="statMult">ステ×倍率</option>
                          </select>
                        </div>
                        {cond.mode==='fixed'&&(
                          <div style={rowS}>
                            <span style={fLbl}>確率%:</span>
                            <input type="number" value={cond.value??50} min={0} max={100}
                              onChange={e=>updateCondAt(ci,{value:+e.target.value})} style={{...iS,width:60}}/>
                          </div>
                        )}
                        {cond.mode==='statMult'&&(<>
                          <div style={rowS}>
                            <span style={fLbl}>対象:</span>
                            <input list="dl-enemy-ids" value={cond.targetId||''} placeholder="空=トリガー元"
                              onChange={e=>updateCondAt(ci,{targetId:e.target.value})} style={{...iS,width:100}}/>
                            <span style={fLbl}>ステ:</span>
                            <select value={cond.stat||'int'} onChange={e=>updateCondAt(ci,{stat:e.target.value})}
                              style={{...iS,width:60,cursor:'pointer'}}>
                              {['hp','str','def','int','mov'].map(s=><option key={s} value={s}>{s.toUpperCase()}</option>)}
                            </select>
                          </div>
                          <div style={rowS}>
                            <span style={fLbl}>×倍率:</span>
                            <input type="number" value={cond.mult??1} min={0} step={0.1}
                              onChange={e=>updateCondAt(ci,{mult:+e.target.value})} style={{...iS,width:60}}/>
                            <span style={{fontSize:9,color:'#64748b'}}>= 確率%</span>
                          </div>
                        </>)}
                      </>)}

                      {cond.type==='unitStat'&&(<>
                        <div style={rowS}>
                          <span style={fLbl}>対象ID:</span>
                          <input list="dl-enemy-ids" value={cond.targetId||''}
                            onChange={e=>updateCondAt(ci,{targetId:e.target.value})} style={{...iS,width:100}}/>
                        </div>
                        <div style={rowS}>
                          <span style={fLbl}>ステ:</span>
                          <select value={cond.stat||'int'} onChange={e=>updateCondAt(ci,{stat:e.target.value})}
                            style={{...iS,width:60,cursor:'pointer'}}>
                            {['hp','str','def','int','mov'].map(s=><option key={s} value={s}>{s.toUpperCase()}</option>)}
                          </select>
                          <select value={cond.op||'>='} onChange={e=>updateCondAt(ci,{op:e.target.value})}
                            style={{...iS,width:50,cursor:'pointer'}}>
                            <option value=">=">{'>='}</option><option value="<=">{'<='}</option>
                            <option value=">">{'>'}</option><option value="<">{'<'}</option>
                            <option value="==">{'=='}</option><option value="!=">{'!='}</option>
                          </select>
                          <input type="number" value={cond.value??10}
                            onChange={e=>updateCondAt(ci,{value:+e.target.value})} style={{...iS,width:50}}/>
                        </div>
                      </>)}

                      {(cond.type==='allyCount'||cond.type==='enemyCount')&&(
                        <div style={rowS}>
                          <span style={fLbl}>比較:</span>
                          <select value={cond.op||'<='} onChange={e=>updateCondAt(ci,{op:e.target.value})}
                            style={{...iS,width:60,cursor:'pointer'}}>
                            <option value="<=">{'<='}</option><option value=">=">{'≥'}</option>
                            <option value="<">{'<'}</option><option value=">">{'>'}</option>
                            <option value="==">{'=='}</option>
                          </select>
                          <span style={fLbl}>値:</span>
                          <input type="number" value={cond.value??0}
                            onChange={e=>updateCondAt(ci,{value:+e.target.value})} style={{...iS,width:50}}/>
                        </div>
                      )}

                      {(cond.type==='unitAlive'||cond.type==='unitDead')&&(
                        <div style={rowS}>
                          <span style={fLbl}>対象ID:</span>
                          <input list="dl-enemy-ids" value={cond.targetId||''}
                            onChange={e=>updateCondAt(ci,{targetId:e.target.value})} style={{...iS,flex:1}}/>
                        </div>
                      )}
                    </div>
                    );
                  })}
                </div>

                {/* Actions */}
                <div style={cardS}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div style={secH}>アクション ({selEvt.actions.length})</div>
                    <div style={{position:'relative'}}>
                      <select onChange={e=>{if(e.target.value){addAction(selectedEvent,e.target.value);e.target.value='';}}}
                        style={{...iS,width:120,cursor:'pointer'}} defaultValue="">
                        <option value="" disabled>+ 追加...</option>
                        {actionTypes.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                      </select>
                    </div>
                  </div>
                  {selEvt.actions.map((act,ai)=>{
                    const actName=actionTypes.find(a=>a.id===act.type)?.name||act.type;
                    return(
                    <div key={ai} style={{background:'#0f172a',border:'1px solid #334155',borderRadius:4,padding:8,marginBottom:6}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>[{ai+1}] {actName}</span>
                        <div style={{display:'flex',gap:3}}>
                          <button onClick={()=>moveAction(selectedEvent,ai,-1)} disabled={ai===0}
                            style={{...smBtn('#334155',ai===0?'#334155':'#94a3b8'),padding:'1px 5px',fontSize:9}}>↑</button>
                          <button onClick={()=>moveAction(selectedEvent,ai,1)} disabled={ai===selEvt.actions.length-1}
                            style={{...smBtn('#334155',ai===selEvt.actions.length-1?'#334155':'#94a3b8'),padding:'1px 5px',fontSize:9}}>↓</button>
                          <button onClick={()=>removeAction(selectedEvent,ai)} style={smBtn('rgba(239,68,68,0.2)','#fca5a5')}>×</button>
                        </div>
                      </div>

                      {/* spawn */}
                      {act.type==='spawn'&&(<>
                        {(act.units||[]).map((u,ui)=>(
                          <div key={ui} style={{background:'#1e293b',borderRadius:3,padding:6,marginBottom:4}}>
                            <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                              <span style={{fontSize:9,color:'#64748b'}}>テンプレ:</span>
                              <select value={u.template||''} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],template:e.target.value};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:100,cursor:'pointer',fontSize:10}}>
                                <option value="">--</option>
                                {enemyTemplates.map(t=><option key={t.name} value={t.name}>{t.name}</option>)}
                              </select>
                              <span style={{fontSize:9,color:'#64748b'}}>x:</span>
                              <input type="number" value={u.x??0} min={0} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],x:+e.target.value};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:35,fontSize:10}}/>
                              <span style={{fontSize:9,color:'#64748b'}}>y:</span>
                              <input type="number" value={u.y??0} min={0} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],y:+e.target.value};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:35,fontSize:10}}/>
                              <span style={{fontSize:9,color:'#64748b'}}>移動:</span>
                              <select value={u.ai?.movement||'rush'} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],ai:{...(units[ui].ai||{}),movement:e.target.value}};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:55,cursor:'pointer',fontSize:10}}>
                                {MOVEMENTS.map(m=><option key={m.id} value={m.id}>{m.short}</option>)}
                              </select>
                              <span style={{fontSize:9,color:'#64748b'}}>行動:</span>
                              <select value={u.ai?.action||'attack'} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],ai:{...(units[ui].ai||{}),action:e.target.value}};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:55,cursor:'pointer',fontSize:10}}>
                                {ACTIONS.map(a=><option key={a.id} value={a.id}>{a.short}</option>)}
                              </select>
                              <span style={{fontSize:9,color:'#64748b'}}>Lv:</span>
                              <input type="number" value={u.level||1} min={1} onChange={e=>{
                                const units=[...(act.units||[])];units[ui]={...units[ui],level:+e.target.value};
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...iS,width:35,fontSize:10}}/>
                              <label style={{fontSize:9,color:u.minion!==false?'#60a5fa':'#64748b',display:'flex',alignItems:'center',gap:2,cursor:'pointer'}}>
                                <input type="checkbox" checked={u.minion!==false} onChange={e=>{
                                  const units=[...(act.units||[])];units[ui]={...units[ui],minion:e.target.checked};
                                  updateAction(selectedEvent,ai,{units});
                                }}/> ミニオン</label>
                              <button onClick={()=>{
                                const units=(act.units||[]).filter((_,i)=>i!==ui);
                                updateAction(selectedEvent,ai,{units});
                              }} style={{...smBtn('rgba(239,68,68,0.15)','#fca5a5'),fontSize:9}}>削除</button>
                            </div>
                          </div>
                        ))}
                        <button onClick={()=>{
                          const def={template:enemyTemplates[0]?.name||'',x:0,y:0,ai:{movement:'rush',action:'attack'},level:1,minion:true};
                          updateAction(selectedEvent,ai,{units:[...(act.units||[]),def]});
                        }} style={smBtn('#334155','#94a3b8')}>+ ユニット追加</button>
                      </>)}

                      {/* despawn */}
                      {act.type==='despawn'&&(
                        <div style={rowS}>
                          <span style={fLbl}>対象ID:</span>
                          <input value={(act.targetIds||[]).join(',')}
                            onChange={e=>updateAction(selectedEvent,ai,{targetIds:e.target.value.split(',').map(s=>s.trim()).filter(Boolean)})}
                            style={{...iS,flex:1}} placeholder="e1, e2, ..."/>
                        </div>
                      )}

                      {/* dialogue */}
                      {act.type==='dialogue'&&(<>
                        {(act.lines||[]).map((l,li)=>(
                          <div key={li} style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>
                            <span style={{fontSize:9,color:'#475569',width:16}}>[{li+1}]</span>
                            <input value={l.speaker||''} onChange={e=>{
                              const lines=[...(act.lines||[])];lines[li]={...lines[li],speaker:e.target.value};
                              updateAction(selectedEvent,ai,{lines});
                            }} style={{...iS,width:60,fontSize:10}} placeholder="話者"/>
                            <input value={l.text||''} onChange={e=>{
                              const lines=[...(act.lines||[])];lines[li]={...lines[li],text:e.target.value};
                              updateAction(selectedEvent,ai,{lines});
                            }} style={{...iS,flex:1,fontSize:10}} placeholder="テキスト"/>
                            <button onClick={()=>{
                              const lines=(act.lines||[]).filter((_,i)=>i!==li);
                              updateAction(selectedEvent,ai,{lines});
                            }} style={{...smBtn('rgba(239,68,68,0.15)','#fca5a5'),fontSize:9}}>×</button>
                          </div>
                        ))}
                        <button onClick={()=>{
                          updateAction(selectedEvent,ai,{lines:[...(act.lines||[]),{speaker:'???',text:''}]});
                        }} style={smBtn('#334155','#94a3b8')}>+ 行追加</button>
                      </>)}

                      {/* terrainChange */}
                      {act.type==='terrainChange'&&(<>
                        {(act.cells||[]).map((c,ci)=>(
                          <div key={ci} style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>
                            <span style={{fontSize:10,color:'#94a3b8'}}>({c.x},{c.y}) → {terrains[c.terrainId]?.name||c.terrainId}</span>
                            <button onClick={()=>{
                              const cells=(act.cells||[]).filter((_,i)=>i!==ci);
                              updateAction(selectedEvent,ai,{cells});
                            }} style={{...smBtn('rgba(239,68,68,0.15)','#fca5a5'),fontSize:9,marginLeft:'auto'}}>×</button>
                          </div>
                        ))}
                        <div style={{display:'flex',gap:4,alignItems:'center',marginTop:4}}>
                          <span style={{fontSize:9,color:'#64748b'}}>x:</span>
                          <input type="number" id={`tc_x_${ai}`} min={0} style={{...iS,width:35,fontSize:10}}/>
                          <span style={{fontSize:9,color:'#64748b'}}>y:</span>
                          <input type="number" id={`tc_y_${ai}`} min={0} style={{...iS,width:35,fontSize:10}}/>
                          <span style={{fontSize:9,color:'#64748b'}}>地形:</span>
                          <select id={`tc_t_${ai}`} style={{...iS,width:80,cursor:'pointer',fontSize:10}}>
                            {terrains.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                          </select>
                          <button onClick={()=>{
                            const xE=document.getElementById(`tc_x_${ai}`),yE=document.getElementById(`tc_y_${ai}`),tE=document.getElementById(`tc_t_${ai}`);
                            const nx=+xE.value,ny=+yE.value,nt=+tE.value;
                            if(isNaN(nx)||isNaN(ny))return;
                            updateAction(selectedEvent,ai,{cells:[...(act.cells||[]),{x:nx,y:ny,terrainId:nt}]});
                          }} style={smBtn('#334155','#94a3b8')}>追加</button>
                        </div>
                      </>)}

                      {/* objective */}
                      {act.type==='objective'&&(
                        <div style={rowS}>
                          <span style={fLbl}>結果:</span>
                          <select value={act.result||'win'} onChange={e=>updateAction(selectedEvent,ai,{result:e.target.value})}
                            style={{...iS,width:80,cursor:'pointer'}}>
                            <option value="win">win</option><option value="lose">lose</option>
                          </select>
                        </div>
                      )}

                      {/* setFlag */}
                      {act.type==='setFlag'&&(<>
                        <div style={rowS}>
                          <span style={fLbl}>フラグ名:</span>
                          <input value={act.flag||''} onChange={e=>updateAction(selectedEvent,ai,{flag:e.target.value})} style={{...iS,flex:1}}/>
                        </div>
                        <div style={rowS}>
                          <span style={fLbl}>値:</span>
                          <input value={act.value??''} onChange={e=>updateAction(selectedEvent,ai,{value:e.target.value})} style={{...iS,flex:1}}/>
                        </div>
                      </>)}

                      {/* bgm */}
                      {act.type==='bgm'&&(<>
                        <div style={rowS}>
                          <span style={fLbl}>トラック:</span>
                          <input value={act.track||''} onChange={e=>updateAction(selectedEvent,ai,{track:e.target.value})} style={{...iS,flex:1}} placeholder="track_id（空=停止）"/>
                        </div>
                        <div style={rowS}>
                          <label style={{fontSize:10,color:'#94a3b8',display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}>
                            <input type="checkbox" checked={act.priority||false} onChange={e=>updateAction(selectedEvent,ai,{priority:e.target.checked})}/>
                            優先（会話BGM等、他を上書き）
                          </label>
                        </div>
                        <div style={rowS}>
                          <span style={fLbl}>フェード(ms):</span>
                          <input type="number" value={act.fade??0} min={0} onChange={e=>updateAction(selectedEvent,ai,{fade:+e.target.value})} style={{...iS,width:60}}/>
                          <label style={{fontSize:10,color:'#94a3b8',display:'flex',alignItems:'center',gap:4,cursor:'pointer',marginLeft:8}}>
                            <input type="checkbox" checked={act.resume||false} onChange={e=>updateAction(selectedEvent,ai,{resume:e.target.checked})}/>
                            終了後に前の曲へ復帰
                          </label>
                        </div>
                      </>)}

                      {/* camera */}
                      {act.type==='camera'&&(
                        <div style={rowS}>
                          <span style={{fontSize:9,color:'#64748b'}}>x:</span>
                          <input type="number" value={act.x??0} onChange={e=>updateAction(selectedEvent,ai,{x:+e.target.value})} style={{...iS,width:45}}/>
                          <span style={{fontSize:9,color:'#64748b'}}>y:</span>
                          <input type="number" value={act.y??0} onChange={e=>updateAction(selectedEvent,ai,{y:+e.target.value})} style={{...iS,width:45}}/>
                          <span style={{fontSize:9,color:'#64748b'}}>時間(ms):</span>
                          <input type="number" value={act.duration??500} min={0} onChange={e=>updateAction(selectedEvent,ai,{duration:+e.target.value})} style={{...iS,width:60}}/>
                        </div>
                      )}

                      {/* changeAI */}
                      {act.type==='changeAI'&&(
                        <div>
                          <div style={{...rowS,marginBottom:4}}>
                            <span style={{fontSize:9,color:'#64748b'}}>対象:</span>
                            <input value={act.target||''} onChange={e=>updateAction(selectedEvent,ai,{target:e.target.value})}
                              style={{...iS,flex:1,fontSize:10}} placeholder="グループ名 / 敵ID / all" list="dl-enemy-groups"/>
                          </div>
                          <div style={{...rowS,marginBottom:4}}>
                            <span style={{fontSize:9,color:'#64748b'}}>移動:</span>
                            <select value={act.ai?.movement||''} onChange={e=>{
                              const v=e.target.value;const na={...(act.ai||{})};
                              if(v)na.movement=v;else delete na.movement;
                              updateAction(selectedEvent,ai,{ai:Object.keys(na).length?na:null});
                            }} style={{...iS,width:70,fontSize:10,cursor:'pointer'}}>
                              <option value="">変更なし</option>
                              {MOVEMENTS.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <span style={{fontSize:9,color:'#64748b'}}>行動:</span>
                            <select value={act.ai?.action||''} onChange={e=>{
                              const v=e.target.value;const na={...(act.ai||{})};
                              if(v)na.action=v;else delete na.action;
                              updateAction(selectedEvent,ai,{ai:Object.keys(na).length?na:null});
                            }} style={{...iS,width:80,fontSize:10,cursor:'pointer'}}>
                              <option value="">変更なし</option>
                              {ACTIONS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                            </select>
                          </div>
                          <div style={{fontSize:8,color:'#475569'}}>※ ai:null で上書きリセット（テンプレAI+aiRulesに戻す）</div>
                        </div>
                      )}
                    </div>
                    );
                  })}
                  {selEvt.actions.length===0&&<div style={{fontSize:10,color:'#475569',textAlign:'center',padding:8}}>アクションなし</div>}
                </div>
              </div>
            )}
          </div>
        </div>
        );
      })()}

      {/* ── Import/Export Bar ── */}
      <div style={{background:'#1e293b',borderTop:'1px solid #334155',padding:'6px 16px',display:'flex',alignItems:'center',gap:8,flexShrink:0,flexWrap:'wrap'}}>
        <button onClick={handleExport} style={abtn('#3b82f6','#fff')}>📋 エクスポート</button>
        <button onClick={handleDownload} style={abtn('#2563eb','#fff')}>💾 JSON保存</button>
        <label style={{...abtn('#334155','#94a3b8'),cursor:'pointer'}}>
          📂 JSON読込<input type="file" accept=".json" onChange={handleFileImport} style={{display:'none'}}/>
        </label>
        <button onClick={handleTextImport} style={abtn('#334155','#94a3b8')}>📝 テキスト読込</button>
        <button onClick={handleClearAll} style={abtn('#334155','#64748b')}>全クリア</button>
        <div style={{marginLeft:'auto',fontSize:9,color:'#475569'}}>
          Zoom: {tileSize}px | Grid: {showGrid?'ON':'OFF'} [G]
        </div>
      </div>

      {/* ── Export Overlay ── */}
      {showExport&&(
        <div style={{position:'fixed',bottom:48,left:0,right:0,background:'#1e293b',borderTop:'1px solid #334155',padding:12,zIndex:100}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,color:'#64748b'}}>エクスポートデータ</span>
            <div style={{display:'flex',gap:4}}>
              <button onClick={()=>navigator.clipboard?.writeText(exported)}
                style={{background:'#3b82f6',color:'#fff',border:'none',borderRadius:4,padding:'4px 12px',fontSize:11,cursor:'pointer'}}>コピー</button>
              <button onClick={()=>setShowExport(false)}
                style={{background:'#334155',color:'#94a3b8',border:'none',borderRadius:4,padding:'4px 12px',fontSize:11,cursor:'pointer'}}>閉じる</button>
            </div>
          </div>
          <textarea value={exported} readOnly
            style={{width:'100%',height:200,background:'#0f172a',color:'#94a3b8',border:'1px solid #334155',borderRadius:4,padding:8,fontSize:10,fontFamily:'monospace',resize:'vertical'}}/>
        </div>
      )}
    </div>
  );
}

// Style helpers
function abtn(bg,c){return{display:'inline-block',padding:'5px 12px',background:bg,color:c,border:'none',borderRadius:4,fontSize:11,fontWeight:600,cursor:'pointer'};}
function ubtn(ok){return{padding:'3px 8px',fontSize:11,fontWeight:600,borderRadius:4,cursor:ok?'pointer':'default',background:ok?'#334155':'#1e293b',color:ok?'#94a3b8':'#334155',border:'1px solid #334155',opacity:ok?1:0.5};}

// ── App Root ──
function App(){
  const [gameData,setGameData]=useState(null);

  if(!gameData) return <DataLoader onReady={d=>setGameData(d)}/>;
  return <MapEditor gameData={gameData}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
