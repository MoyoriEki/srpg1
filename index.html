<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- fullscreen 没入で運用。上端1pxの白ラインは Chrome 固有のレンダリング挙動で、
       Web側からは確実に消せないと判明したため（Samsung Internet 等では出ない）割り切る。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e1e" />
  <meta name="application-name" content="SRPG Proto" />
  <meta name="apple-mobile-web-app-title" content="SRPG Proto" />
  <link rel="manifest" href="/srpg1/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/srpg1/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/srpg1/icons/icon-192.png" />
  <title>SRPG Proto 2.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* html にも背景色を敷く。これが無いと html はデフォルト透明＝裏のブラウザキャンバス（白）が見える。
       standalone PWA でステータスバー境界やsafe-area/サブピクセル丸めで最上部に1px隙間ができた瞬間、
       その白が「上端の白ライン」として覗く（間欠的に発生）。html を背景同色にして白透けを防ぐ。 */
    html, body { width: 100%; height: 100%; background: #0a0e1e; }
    body {
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    #root { background: #0a0e1e; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // PWA: Service Worker 登録（Android で「アプリとしてインストール」可能に）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/srpg1/sw.js', { scope: '/srpg1/' }).catch(() => {});
      });
    }
  </script>
</body>
</html>
